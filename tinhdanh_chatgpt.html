<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lập Quẻ Tính Danh Nâng Cao</title>

<style>

body{
font-family:Arial;
background:#f0f2f5;
display:flex;
justify-content:center;
}

.container{
width:400px;
text-align:center;
}

input,select{
width:90%;
padding:10px;
margin:5px;
}

button{
padding:10px 20px;
background:#007bff;
color:white;
border:none;
cursor:pointer;
}

.card{
background:white;
padding:15px;
margin-top:10px;
border-radius:10px;
}

.hexagram{
display:flex;
flex-direction:column;
gap:6px;
align-items:center;
}

.line{
width:120px;
height:10px;
background:#007bff;
}

.broken{
display:flex;
justify-content:space-between;
background:transparent;
}

.broken:before,
.broken:after{
content:"";
width:45%;
height:10px;
background:#007bff;
}

</style>
</head>

<body>

<div class="container">

<h2>Quẻ Tính Danh Nâng Cao</h2>

<input id="fullname" placeholder="Name 1">

<input id="fullname2" placeholder="Name 2">

<select id="year">
<option value="0">Năm</option>
<option value="1">Tý</option>
<option value="2">Sửu</option>
<option value="3">Dần</option>
<option value="4">Mão</option>
<option value="5">Thìn</option>
<option value="6">Tỵ</option>
<option value="7">Ngọ</option>
<option value="8">Mùi</option>
<option value="9">Thân</option>
<option value="10">Dậu</option>
<option value="11">Tuất</option>
<option value="12">Hợi</option>
</select>

<select id="month">
<option value="0">Tháng</option>
<option value="7">Thân</option>
<option value="5">Thìn</option>
</select>

<select id="day">
<option value="0">Ngày</option>
<option value="5">Thìn</option>
</select>

<select id="hour">
<option value="0">Giờ</option>
<option value="7">Ngọ</option>
</select>

<button onclick="lapQue()">Tính Quẻ</button>

<div id="result"></div>

</div>

<script>

const data64Que={
"100001":"Sơn Lôi Di",
"101001":"Hỏa Lôi Phệ Hạp"
}

const batQuai=[
"",
"111",
"011",
"101",
"001",
"110",
"010",
"100",
"000"
]

function countChar(str){

let s=str.replace(/\s/g,'')

let accents=(str.normalize('NFD').match(/[\u0300\u0301\u0303\u0309\u0323]/g)||[]).length

return s.length+accents

}

function getQuai(num){

let r=num%8

if(r===0) r=8

return batQuai[r]

}

function haoDong(num){

let r=num%6

if(r===0) r=6

return r

}

function changeLine(code,h){

let arr=code.split("")

let index=6-h

arr[index]=arr[index]=="1"?"0":"1"

return arr.join("")

}

function draw(code){

let html=""

for(let c of code){

if(c=="1")

html+='<div class="line"></div>'

else

html+='<div class="line broken"></div>'

}

return html

}

function lapQue(){

let n1=document.getElementById("fullname").value.trim()
let n2=document.getElementById("fullname2").value.trim()

if(!n1||!n2){

alert("Nhập đủ 2 tên")
return
}

let w1=n1.split(/\s+/)
let w2=n2.split(/\s+/)

let T1=countChar(w1[0])
let H1=countChar(w1.slice(1).join(""))

let T2=countChar(w2[0])
let H2=countChar(w2.slice(1).join(""))

let year=parseInt(document.getElementById("year").value)
let month=parseInt(document.getElementById("month").value)
let day=parseInt(document.getElementById("day").value)
let hour=parseInt(document.getElementById("hour").value)

let tong=T1+T2+H1+H2+year+month+day+hour

let dong=haoDong(tong)

let up=getQuai(T1+T2)
let low=getQuai(H1+H2)

let code=up+low

let code2=changeLine(code,dong)

let html=`

<div class="card">

<h3>Quẻ Gốc</h3>

${draw(code)}

<p>${data64Que[code]||code}</p>

<p>Hào động: ${dong}</p>

</div>

<div class="card">

<h3>Quẻ Biến</h3>

${draw(code2)}

<p>${data64Que[code2]||code2}</p>

</div>

`

document.getElementById("result").innerHTML=html

}

</script>

</body>
</html>

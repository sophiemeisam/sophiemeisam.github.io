<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liên Hoa 12 Không Thời</title>

<style>
:root { --gold:#f1c40f; --dark:#121212; --card:#1e1e1e; }

body {
    font-family: -apple-system, sans-serif;
    background: var(--dark);
    color: #fff;
    display: flex;
    justify-content: center;
    padding: 20px;
}

.container {
    width: 100%;
    max-width: 700px;
    background: var(--card);
    padding: 20px;
    border-radius: 16px;
}

input {
    width: 100%;
    padding: 10px;
    margin-bottom: 8px;
    border-radius: 8px;
    border: 1px solid #444;
    background: #000;
    color: #fff;
}

.preview {
    margin-top: 20px;
    padding: 15px;
    background: #000;
    border-radius: 10px;
    white-space: pre;
    font-size: 14px;
}

button {
    margin-top: 10px;
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 10px;
    background: var(--gold);
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

<div id="inputs"></div>

<div id="preview" class="preview"></div>

<button onclick="copyAll()">Sao chép toàn bộ</button>

</div>

<script>

const headers = ["Chính","Hỗ","Biến"];

// 🔥 MAP VIẾT TẮT
const trigramMap = {
    "Km": "Khảm",
    "Kh": "Khôn",
    "Ch": "Chấn",
    "K": "Kiền",
    "Đ": "Đoài",
    "L": "Ly",
    "C": "Cấn",
    "T": "Tốn"
};

// chuẩn hóa 1 token
function normalizeToken(token){
    token = token.trim();

    // nếu đã là tên đầy đủ thì giữ nguyên
    if(Object.values(trigramMap).includes(token)) return token;

    // ưu tiên match key dài trước
    const keys = Object.keys(trigramMap).sort((a,b)=>b.length-a.length);

    for(let key of keys){
        if(token === key){
            return trigramMap[key];
        }
    }

    return token; // không match thì giữ nguyên
}

// tạo 12 input
const inputsDiv = document.getElementById("inputs");

for(let i=1;i<=12;i++){
    const input = document.createElement("input");
    input.placeholder = `${i} VD: ${i} K, Ch, T, C, Km, Ch`;
    input.id = "input"+i;
    input.addEventListener("input", update);
    inputsDiv.appendChild(input);
}

// parse input
function parseLine(str){
    let parts = str.trim().split(/\s+/);
    if(parts.length < 2) return null;

    let index = parts[0];
    let rest = str.substring(index.length).trim();

    let rawArr = rest.split(/,|\s+/).map(s=>s.trim()).filter(s=>s);

    if(rawArr.length < 6) return null;

    // 🔥 chuyển viết tắt → full
    let arr = rawArr.slice(0,6).map(normalizeToken);

    return {
        index: index,
        data: arr
    };
}

// build bảng
function buildTable(obj){

    const arr = obj.data;

    const data = [
        headers,
        [arr[0], arr[2], arr[4]],
        [arr[1], arr[3], arr[5]]
    ];

    const colWidths = headers.map((_, i) =>
        Math.max(...data.map(row => row[i].length))
    );

    const pad = (t,w)=>t.padEnd(w," ");

    const headerRow = data[0].map((c,i)=>pad(c,colWidths[i])).join(" | ");
    const separator = colWidths.map(w=>"-".repeat(w)).join("-+-");
    const row1 = data[1].map((c,i)=>pad(c,colWidths[i])).join(" | ");
    const row2 = data[2].map((c,i)=>pad(c,colWidths[i])).join(" | ");

    return obj.index + "\n" + headerRow + "\n" + separator + "\n" + row1 + "\n" + row2;
}

// update preview
function update(){

    let result = [];

    for(let i=1;i<=12;i++){
        let val = document.getElementById("input"+i).value;

        if(!val.trim()) continue;

        let parsed = parseLine(val);
        if(parsed){
            result.push(buildTable(parsed));
        }
    }

    document.getElementById("preview").innerText = result.join("\n\n");
}

// copy
function copyAll(){
    const text = document.getElementById("preview").innerText.trim();
    navigator.clipboard.writeText(text);
    alert("Đã copy toàn bộ 👍");
}

update();

</script>

</body>
</html>

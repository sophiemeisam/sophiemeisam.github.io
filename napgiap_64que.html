<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">

    <title>Dịch Lý Toàn Thư - 64 Quẻ Nạp Giáp</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #8e2e00; --gold: #d4af37; --bg: #f8f5f2; --text: #2d3436; }
        body { font-family: 'Lexend', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 500px; }
        .header { text-align: center; margin-bottom: 20px; padding: 10px; border-bottom: 2px solid var(--primary); }
        .header h1 { color: var(--primary); font-size: 1.3rem; margin: 0; text-transform: uppercase; }

        /* Selector Box */
        .box { background: #fff; border-radius: 15px; padding: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        label { font-size: 0.75rem; font-weight: 600; color: #888; text-transform: uppercase; margin-bottom: 8px; display: block; }
        select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; font-family: inherit; font-size: 1rem; margin-bottom: 15px; outline: none; background: #fff; cursor: pointer; }

        /* Card Kết quả */
        .que-card { background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; display: none; }
        .que-header { background: var(--primary); color: white; padding: 20px; text-align: center; }
        .que-name { font-size: 1.6rem; font-weight: bold; margin: 0; }
        .que-cung { font-size: 0.85rem; opacity: 0.9; margin-top: 5px; letter-spacing: 1px; }

        /* Hào Display */
        .hex-container { padding: 30px 15px; display: flex; flex-direction: column-reverse; gap: 12px; }
        .hao-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        .nap-giap { width: 140px; font-size: 0.9rem; color: #444; font-weight: 500; text-align: left; }
        .line-box { flex-grow: 1; height: 14px; min-width: 100px; }
        .line-yang { width: 100%; height: 100%; background: var(--primary); border-radius: 2px; }
        .line-yin { width: 100%; height: 100%; display: flex; justify-content: space-between; }
        .line-yin::before, .line-yin::after { content: ""; width: 43%; height: 100%; background: var(--primary); border-radius: 2px; }
        .the-ung { width: 45px; font-size: 0.85rem; font-weight: bold; color: #d63031; text-align: right; }
        
        .footer-info { background: #f1f2f6; padding: 12px; text-align: center; font-size: 0.75rem; color: #636e72; border-top: 1px solid #eee; }
    </style>
</head>

function updateQueList() {
    const cung = document.getElementById("selectCung").value;
    const queSelect = document.getElementById("selectQue");
    queSelect.innerHTML = '<option value="">-- Chọn quẻ --</option>';
    if (cung && dataDich[cung]) {
        Object.keys(dataDich[cung].quẻ).forEach(qName => {
            let opt = document.createElement("option");
            opt.value = qName; opt.text = qName;
            queSelect.appendChild(opt);
        });
    }
}

function displayQue() {
    const cungKey = document.getElementById("selectCung").value;
    const qName = document.getElementById("selectQue").value;
    const resPanel = document.getElementById("queResult");
    if (!cungKey || !qName) { resPanel.style.display = "none"; return; }

    const cung = dataDich[cungKey];
    const que = cung.quẻ[qName];
    document.getElementById("resName").innerText = qName;
    document.getElementById("resCung").innerText = `HỌ ${cung.name.toUpperCase()} (${cung.hanh})`;
    
    const hexVisual = document.getElementById("hexVisual");
    hexVisual.innerHTML = "";

    // Render hào từ hào 1 (index 5 trong code nhị phân) lên hào 6 (index 0)
    // Data n: [hào 1, hào 2, hào 3, hào 4, hào 5, hào 6]
    for (let i = 0; i < 6; i++) {
        const row = document.createElement("div");
        row.className = "hao-row";
        
        const isYang = que.c[5 - i] === "1";
        const napText = que.n[i];
        let label = ""; 
        let cleanNap = napText;

        if(napText.includes("(Thế)")) { label = "Thế"; cleanNap = napText.replace("(Thế)",""); }
        else if(napText.includes("(Ứng)")) { label = "Ứng"; cleanNap = napText.replace("(Ứng)",""); }

        row.innerHTML = `
            <div class="nap-giap">${cleanNap}</div>
            <div class="line-box">${isYang ? '<div class="line-yang"></div>' : '<div class="line-yin"></div>'}</div>
            <div class="the-ung">${label}</div>
        `;
        hexVisual.appendChild(row);
    }
    resPanel.style.display = "block";
}
</script>

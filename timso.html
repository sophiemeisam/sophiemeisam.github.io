<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Dãy Số Thông Minh - Mobile Optimized</title>
    <style>
        /* Tối ưu hóa nền tảng */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f0f2f5;
            margin: 0; padding: 15px;
            display: flex; justify-content: center;
        }

        .container { width: 100%; max-width: 450px; }
        h2 { text-align: center; color: #1a73e8; font-size: 1.2rem; margin-bottom: 20px; text-transform: uppercase; }

        .card {
            background: #fff;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: 1px solid #e8eaed;
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #f1f3f4;
        }

        .label-group { display: flex; flex-direction: column; width: 48%; }
        .label-group label { font-size: 11px; color: #70757a; font-weight: bold; margin-bottom: 4px; }
        
        /* Input tùy chỉnh cho cấu hình */
        .config-input {
            width: 100%;
            padding: 10px;
            border: 1px solid #dadce0;
            border-radius: 8px;
            font-size: 16px; /* Tránh tự động zoom trên iOS */
            background: #f8f9fa;
        }

        /* Container chứa các ô số nhập liệu */
        .inputs-wrapper {
            display: flex;
            gap: 6px; /* Khoảng cách nhỏ giữa các ô */
            justify-content: space-between;
        }

        .number-box {
            flex: 1; /* Chia đều chiều rộng */
            min-width: 0; /* Quan trọng để flex không bị vỡ */
            height: 50px;
            text-align: center;
            font-size: 18px;
            font-weight: 600;
            border: 1px solid #dadce0;
            border-radius: 8px;
            outline: none;
            -moz-appearance: textfield; /* Ẩn nút tăng giảm Firefox */
        }

        /* Ẩn nút tăng giảm Chrome/Safari */
        .number-box::-webkit-outer-spin-button,
        .number-box::-webkit-inner-spin-button {
            -webkit-appearance: none; margin: 0;
        }

        .number-box:focus { border-color: #1a73e8; background: #e8f0fe; }

        /* Ô kết quả cuối cùng */
        .result-box {
            background-color: #1a73e8 !important;
            color: white !important;
            border-color: #1a73e8 !important;
        }

        .title-badge {
            background: #1a73e8; color: white;
            padding: 2px 10px; border-radius: 20px; font-size: 12px;
        }

        /* Nút reset nhanh */
        .btn-reset {
            width: 100%; padding: 12px; margin-top: 10px;
            border: none; border-radius: 8px;
            background: #dadce0; color: #3c4043;
            font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Trình tính dãy số</h2>

    <!-- Khối Dãy A -->
    <div class="card">
        <div class="header-row">
            <span class="title-badge">Dãy A</span>
            <div class="label-group">
                <label>SỐ LƯỢNG</label>
                <input type="number" id="count-A" class="config-input" value="3" min="3" max="7" onchange="build('A')">
            </div>
            <div class="label-group">
                <label>TỔNG MỤC TIÊU</label>
                <input type="number" id="target-A" class="config-input" value="12" inputmode="decimal" oninput="calc('A')">
            </div>
        </div>
        <div id="box-A" class="inputs-wrapper"></div>
    </div>

    <!-- Khối Dãy B -->
    <div class="card">
        <div class="header-row">
            <span class="title-badge" style="background:#34a853">Dãy B</span>
            <div class="label-group">
                <label>SỐ LƯỢNG</label>
                <input type="number" id="count-B" class="config-input" value="3" min="3" max="7" onchange="build('B')">
            </div>
            <div class="label-group">
                <label>TỔNG MỤC TIÊU</label>
                <input type="number" id="target-B" class="config-input" value="14" inputmode="decimal" oninput="calc('B')">
            </div>
        </div>
        <div id="box-B" class="inputs-wrapper"></div>
    </div>

    <button class="btn-reset" onclick="window.location.reload()">LÀM MỚI TẤT CẢ</button>
</div>

<script>
    function build(type) {
        const n = parseInt(document.getElementById(`count-${type}`).value);
        const container = document.getElementById(`box-${type}`);
        container.innerHTML = '';

        for (let i = 0; i < n; i++) {
            const input = document.createElement('input');
            input.type = 'number';
            input.inputMode = 'decimal';
            input.className = 'number-box';
            
            if (i === n - 1) {
                input.readOnly = true;
                input.placeholder = "?";
                input.classList.add('result-box');
                input.id = `res-${type}`;
            } else {
                input.className += ` input-${type}`;
                input.addEventListener('input', () => calc(type));
            }
            container.appendChild(input);
        }
    }

    function calc(type) {
        const target = parseFloat(document.getElementById(`target-${type}`).value) || 0;
        const inputs = document.querySelectorAll(`.input-${type}`);
        const resField = document.getElementById(`res-${type}`);
        const count = parseInt(document.getElementById(`count-${type}`).value);
        
        let sum = 0;
        let filled = 0;

        inputs.forEach(el => {
            if (el.value !== "") {
                sum += parseFloat(el.value);
                filled++;
            }
        });

        if (filled === count - 1) {
            let val = target - sum;
            resField.value = Number.isInteger(val) ? val : val.toFixed(1);
        } else {
            resField.value = "";
        }
    }

    window.onload = () => { build('A'); build('B'); };
</script>

</body>
</html>

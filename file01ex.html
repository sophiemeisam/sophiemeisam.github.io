Lá TƯỢNG XANH Ngược đầu cũng tượng trưng cho người bạn quỷ quyệt,một nhân tình ghen bóng ghen gió,ngầm theo đuổi phá hỏng công danh của mình.

2. TƯỢNG VÀNG :
Tượng là voi,từ xa xưa voi lãnh phần khá quan trọng trong chiến trận,voi xông pha trận mạc,yểm trợ đắc lực và hữu hiệu cho cuộc tiến quân.
Trong quẻ bài tứ sắc,Tượng tượng trưng cho thanh niên khỏe mạnh,có khả năng vật chất cũng như tinh thần,sẵn sàng bảo vệ người xin quẻ.
TƯỢNG VÀNG Đ : Lá TƯỢNG VÀNG Đứng tiêu biểu cho 1 thanh niên đẹp trai,hào hoa phong nhã,có khả năng vật chất cũng như tinh thần,tánh tình rộng rãi luôn luôn nuôi hoài bão giúp đời,giúp người.
TƯỢNG VÀNG Đứng cũng tiêu biểu cho 1 người bạn tốt,giàu có,thực tâm,nhân hậu,lúc nào cũng tận tình giúp đỡ người xin quẻ,đây chính là vị cứu tinh.
Nếu người xin quẻ là thiếu nữ,TƯỢNG VÀNG Đứng tiên đoán 1 cuộc hôn nhân giàu có,địa vị.
Nếu người xin quẻ là thanh niên,TƯỢNG VÀNG sẽ mang lại cuộc tình duyên thật đẹp và nhờ tình duyên này mà người thanh niên sẽ làm nên sự nghiệp.
TƯỢNG VÀNG N : Lá TƯỢNG VÀNG Ngược đầu tiêu biểu cho sự phản trắc,lừa dối,gãy đổ vì tánh tình thiếu thành thực của người tình,ý trung nhân,hoặc bạn bè,hoặc là vị hôn thê , hôn phu.
Lá TƯỢNG VÀNG Ngược đầu cũng báo hiệu nhiều xáo trộn xảy ra trong công việc,xí nghiệp,cũng như về tài sản.Cần dè dặt lắm mới tránh được hậu quả bi đát,nhất là khi lá TƯỢNG VÀNG Ngược đầu xuất hiện trong quẻ thì người xin quẻ đừng nghĩ đến việc tiến thân.
3. TƯỢNG TRẮNG :
TƯỢNG TRẮNG trong quẻ bài tứ sắc tượng trưng cho 1 thanh niên du đãng,phóng túng,đàng điếm,nghiện ngập,thành phần tứ đổ tường,chuyên sống về nghề ma cô,qua cầu rút ván.
TƯỢNG TRẮNG Đ : Lá TƯỢNG TRẮNG Đứng tiêu biểu cho mọi quyến rũ về vật chất,lung lạc tinh thần,cạm bẫy đam mê,đưa người xin quẻ sa vào tình trạng bị thu hút không lối thoát.Nếu sa chân vào vũng lầy này thì càng cựa quậy càng lún sâu thêm.
Lá TƯỢNG TRẮNG Đứng cũng tượng trưng cho 1 thanh niên lạ có mã đẹp trai ăn nói lưu loát,nhưng là 1 thanh niên mất nết,thiếu nhân phẩm,giỏi tán tỉnh mê hoặc người xin quẻ.Nếu người xin quẻ là thiếu nữ thì cần hết sức giữ gìn kẻo bị lôi cuốn vào vòng sa ngã .Nếu người xin quẻ là thanh niên thì người thanh niên xấu tính sẽ theo quấy rầy,ngầm phá hỏng mọi công trình của mình hoặc dựng mồi câu nhử đến tán gia bại sản.
TƯỢNG TRẮNG N : TƯỢNG TRẮNG Ngược đầu là lá bài không những nhiều hy vọng mà còn thực hiện được ý định của mình,nhất là trong vấn đề tình ái.
Lá TƯỢNG TRẮNG Ngược đầu cũng tiêu biểu cho những thắng lợi về các cuộc tranh chấp,hoặc báo hiệu sắp có cuộc đi du lịch nơi xa, việc hôn nhân hay công việc đều thuận lợi.
4. TƯỢNG ĐỎ :
TƯỢNG ĐỎ là lá bài trẻ trung nhất trong các lá bài thuộc phạm vi tình cảm ( 28 lá màu đỏ ).
Người xin quẻ dù là thanh niên hay thiếu nữ một khi xin quẻ tình duyên gặp lá bài TƯỢNG ĐỎ Đứng trong quẻ chắc chắn sẽ thành công mặc dù trước đó có sự ngang trái bẽ bàng trong tình duyên.
TƯỢNG ĐỎ Đ : Lá TƯỢNG ĐỎ Đứng tượng trưng cho 1 thanh niên đẹp trai,phong lưu tao nhã,luôn luôn có tư tưởng cao đẹp,là người bạn tốt đối với người xin quẻ.Còn nếu người xin quẻ là thiếu nữ thì người thanh niên tốt này tương lai sẽ là vị hôn phu của người thiếu nữ ấy.
Lá TƯỢNG ĐỎ Đứng cũng tượng trưng cho 1 thiếu nữ duyên dáng,cao thượng,là người bạn tình cờ gặp gỡ của người xin quẻ nếu người xin quẻ là thanh niên,từ tình bạn đến tình duyên chỉ là 1 bước ngắn đầy dẫy hạnh phúc.
Lá TƯỢNG ĐỎ Đứng là lá bài cầu duyên,những cuộc tình duyên lỡ làng,những trở ngại trong hôn nhân,những hiểu lầm không đáng có trong mối tình đầu thì người xin quẻ dù là thanh niên hay thiếu nữ nếu gặp TƯỢNG ĐỎ Đứng xuất hiện trong quẻ cuộc tình duyên sẽ thành tựu chắc chắn,tiến đến hôn nhân rỡ ràng.
TƯỢNG ĐỎ N : Lá TƯỢNG ĐỎ Ngược đầu tiêu biểu cho tất cả những gì phũ phàng trong tình yêu.
Nếu người xin quẻ đã lập gia đình, lá TƯỢNG ĐỎ Ngược đầu là lá bài báo hiệu sự đảo lộn hoàn cảnh của gia đình ấy một cách bi đát.

    CÁC LÁ BÀI XE :

1. XE XANH :
Xe là lá bài chịu ảnh hưởng của sao Thổ Tinh trên Thượng Đình.
Sao Thổ Tinh là vị vua mất ngôi,quanh năm có thái độ u buồn,chán nản,hối hận vì những lỡ lầm trong quá khứ,thích sống trầm lặng,không còn nuôi ý chí tiến thủ.
Nơi chiến trường Xe tiêu biểu cho sĩ quan liên lạc,thi hành chỉ thị của cấp trên,hoặc tình báo viên lỗi lạc nhưng có tánh nông nỗi nên đôi khi thất bại vì sự nông nỗi ấy.
XE XANH Đ : Lá XE XANH Đứng tượng trưng cho sự chậm trễ bất lợi về mọi mặt,nhất là các việc tiến thân ,thi cử hoặc khởi đầu công trình.Nguyên nhân là do sự rụt rè,chần chờ,thiếu kiên quyết của mình mà mọi việc đều chịu ảnh hưởng tai hại.
Lá XE XANH Đứng còn tiêu biểu cho sự bê tha,đồi trụy,lãng mạn nhưng gây bất mãn cho mọi người.
Tuy nhiên lá XE XANH Đứng báo hiệu cho 1 chuyến đi du lịch xa hoặc 1 sự thay đổi thắng lợi về công danh.
XE XANH N : XE XANH Ngược đầu là lá bài báo hiệu mọi trở ngại,thất bại,chậm trễ,không có kết quả trong bất cứ dự tính nào.Nhất là định nuôi ý định đi xa hay thay đổi việc làm,chỗ ở,có thể đổ vỡ tất cả mà không hy vọng phục hồi địa vị hoặc tình trạng cũ.

2. XE VÀNG :
Trong quẻ bài Tứ Sắc thì XE VÀNG chiếm địa vị ưu thế,tiêu biểu cho sự chuyển vận tiền bạc làm nên sự nghiệp cho người xin quẻ.Vì thế khi lá Xe xuất hiện trong quẻ bài thì người xin quẻ có thể mơ ước 1 món tiền sẽ đến,của hoạnh tài,di sản,quà tặng có giá trị.
XE VÀNG Đ : Tiêu biểu cho mọi sự bất ngờ đưa đến cho người xin quẻ đang trong cơn bối rối không biết cậy nhờ vào đâu,hy vọng ấy có thể đến từ món tiền to bất ngờ như trúng số.
XE VÀNG Đứng cũng tiêu biểu cho sự thịnh vượng gần kề của gia đình,sự thành công chắc chắn trong công việc môi giới mua bán hoặc sự thành tựu trong ý định khuếch trương và sau cùng là sự thắng lợi bất ngờ trong vụ kiện dai dẳng lâu ngày chưa giải quyết xong.
XE VÀNG N : Lá XE VÀNG Ngược đầu là bối cảnh của sự lừa phỉnh về tiền bạc,sự dối lừa về bạc tiền được che đậy,kẻ có dã tâm cố tình phỉnh gạt.Ngoài ra cũng báo trước sự mất của do đánh rơi,bị mất cắp hoặc tiền cho mượn.
XE VÀNG Ngược đầu còn ước đoán cho những thua lận có thể sạt nghiệp và tiêu tan nhà cửa nếu người xin quẻ là người ham mê cờ bạc.

3. XE TRẮNG :
XE TRẮNG trong quẻ bài tứ sắc tiêu biểu cho xe tang,mang đến hoàn cảnh não nề,buồn bã,sầu đau,những cảnh ly tán không phương hàn gắn.
XE TRẮNG Đ : Báo động mọi chuyện phiền muộn xảy ra cho gia đình người xin quẻ như ốm đau bệnh tật thập tử nhất sinh,chết chóc khó tránh,gia đình ly tán,chồng vợ xa nhau đưa đến ly dị.
XE TRẮNG Đứng báo trước sự xa quê nhà vì nợ nần,hoặc vấn đề liên quan đến hôn nhân khiến người xin quẻ không còn đủ can đảm ở lại trước sự não nề về tinh thần lẫn vật chất.
XE TRẮNG Đứng còn tiêu biểu cho nước mắt,những sự hiểm nguy bất ngờ làm xáo trộn hay sụp đổ tương lai.
Sau cùng XE TRẮNG còn tiêu biểu cho sự hối hận vô bờ bến vì 1 lỗi lầm trong dĩ vãng mà người xin quẻ day dứt không nguôi.Hậu quả của sự hối hận còn có thể đưa người xin quẻ đến của Phật để nhờ sự an ủi của thiêng liêng xoa dịu phần nào điều hối hận.
XE TRẮNG N : XE TRẮNG Ngược đầu là lá bài biến đổi hẳn những tình trạng của lá XE TRẮNG Đứng, mang lại niềm tin,hàn gắn mọi não nề,hoặc chặn đứng những việc xấu trước khi xảy ra.
Nếu gặp cơn bệnh tật ngặt nghèo,gặp XE TRẮNG Ngược đầu sẽ gặp thầy thuốc giỏi,thuốc lành chữa trị lành căn bệnh.

4. XE ĐỎ :
Trong quẻ bài tứ sắc, TƯỢNG ĐỎ là lá bài cầu duyên thì  XE ĐỎ là lá bài cầu tự,lá bài này rất phù hợp với những người đã lập gia đình hơn là các bạn thanh niên nam nữ.
XE ĐỎ Đ : Là lá bài thứ nhất trong bức tranh Phúc Lộc Thọ,lá bài này cầu con vô cùng linh nghiệm.Phúc là con cái đầy dẫy những hạnh phúc trong tình thương yêu gia đình.Những người không con trông chờ sự nối dõi tông đường một khi xem quẻ bài tứ sắc khai đường mở lối cho việc cầu con mà gặp lá XE ĐỎ Đứng thì chắc chắn sẽ được như ý.
Tuy nhiên lá XE ĐỎ Đứng là lá bài tối kỵ cho việc cầu duyên.Tối kị với ý nghĩa bao quát,cầu con của người đó.Nếu người thanh niên cầu duyên mà gặp lá bài này thì người thanh niên ấy sẽ có con rơi.Phũ phàng nhất cho người xin quẻ là thiếu nữ,gặp lá XE ĐỎ Đứng nên hết sức tự chủ,kẻo lâm vào tình trạng chửa hoang đầy bất hạnh.
XE ĐỎ N : Là lá bài độc nhất gây thất vọng cho người xin quẻ khi muốn cầu duyên.
Hơn thế nữa XE ĐỎ Ngược đầu còn là lá bài báo động sự phản bội ân tình trong gia đình của người đàn ông hay đàn bà,nếu 1 trong 2 người có sự mơ ước viễn vông.

    CÁC LÁ BÀI PHÁO :

1. PHÁO XANH :
Lá Pháo chịu ảnh hưởng của sao Hỏa Tinh trên Thượng Đình.
Hỏa Tinh là vị thần chiến tranh,tính tình hết sức nóng nảy,gan dạ,hào hùng,chững chạc và đầy can đảm giữa chốn hiểm nguy,luôn nuôi ý chí chiến đấu mãnh liệt.Nhưng cũng rất tự chủ lúc nào cũng kìm hãm cá tính của mình,rất cao thượng và đầy tinh thần thượng võ.
PHÁO XANH Đ : Lá PHÁO XANH Đứng báo trước 1 sự thay đổi về địa vị,đổi nghề,hoặc dời chỗ ở,hay nơi du lịch xa xôi với nhiều hy vọng thắng lợi về danh vọng cũng như tiền bạc,nếu là chuyện tâm tình thì trăm phần trăm thỏa mãn.
PHÁO XANH Đứng còn tượng trưng cho thiếu nữ kiều diễm,khả ái,chung tình,gặp gỡ bất ngờ mà thành duyên nợ nếu như người xin quẻ là thanh niên.
PHÁO XANH Đứng cũng tiêu biểu cho 1 sự đỗ đạt chắc chắn nếu người xin quẻ sắp sửa bước vào ngưỡng cửa trường thi.
PHÁO XANH N : PHÁO XANH Ngược đầu là lá bài hung tin,gãy đổ chực chờ,có những lời gièm pha,nói xấu,cãi vã luôn lãng vãng bên mình gây nhiều phiền toái không thể tránh.
Lá PHÁO XANH Ngược đầu cũng báo hiệu sự mất của và hoen ố danh dự.

2. PHÁO VÀNG :
Pháo trong chiến trận là 1 chiến cụ tấn công,còn trong quẻ bài tứ sắc pháo đóng vai trò tương đương,bảo vệ người xin quẻ,chống mọi chướng ngại xung quanh.
PHÁO VÀNG là lá bài sự nghiệp,mang ý nghĩa vun vén cho người xin quẻ về mọi mặt nhất là về tiền bạc để làm nên sự nghiệp,đồng thời cũng bảo vệ người xin quẻ bảo vệ sự nghiệp ấy.
PHÁO VÀNG Đ : PHÁO VÀNG Đứng xuất hiện trong quẻ nói lên việc khởi sự cần tiến hành ngay. Mở cửa hàng,khởi công,đi xa,lập nghiệp…v..v.Hễ trong lòng mình nghĩ sao cứ làm vậy chắc chắn sẽ thành công vì có nhiều người có uy tín nâng đỡ.
PHÁO VÀNG Đứng cũng là lá bài giải quyết vấn đề tiền bạc đang khó khăn,thiếu thốn,nợ nần,tranh chấp..v..v,lá bài PHÁO VÀNG Đứng xuất hiện trong quẻ thì không còn lo ngại nữa,mọi sự sẽ được giải quyết êm đẹp.
Ngoài ra PHÁO VÀNG Đứng còn dứt khoát với những lời hứa hẹn,chẳng hạn như hứa hẹn trong hôn nhân,hứa hẹn tiến cử,hứa hẹn giúp đỡ..v..v mọi việc sẽ thành tựu.
PHÁO VÀNG N : PHÁO VÀNG Ngược đầu có ý nghĩa Ngược lại hoàn toàn so với lá bài Đứng.Những đổ vỡ là không thể tránh,nhất là nợ nần,tranh chấp tiền bạc,hứa hẹn hôn nhân…v..v. Trừ trường hợp PHÁO VÀNG Ngược đầu đi kèm với lá TƯỢNG VÀNG N ( Ngược đầu ) thì mọi việc sẽ dàn xếp tuy chậm nhưng cũng dàn xếp thỏa đáng.

3. PHÁO TRẮNG :
PHÁO TRẮNG là tiếng nổ trong đáy lòng người xin quẻ,gây những thảm trạng đau thương về tinh thần do vật chất chi phối.
PHÁO TRẮNG Đ : Tiêu biểu cho sự mất mát do trộm cắp,khánh kiệt,xuống dốc trong việc làm cũng như trong địa vị do sự tin tưởng không giới hạn đối với người thân tín hoặc nhân tình.Ngày sụp đổ là ngày mà người xin quẻ cảm thấy trong lòng trống vắng,trơ trọi không được nghe 1 lời an ủi dù chỉ là lời an ủi suông.
PHÁO TRẮNG Đứng cũng là lá bài báo động cuộc thay đổi xáo trộn địa vị không thể tránh khiến người trong cuộc phải chịu sự xê dịch bất đắc dĩ,không khác cuộc lưu đày không hạn định.
Ngoài ra PHÁO TRẮNG Đứng còn là lá bài tượng trưng cho sự điên loạn sau khi tình cờ phát giác được sự lừa dối của người xung quanh đã phản bội mình,lừa tiền lừa tình còn mất cả sự nghiệp.
Sau cùng PHÁO TRẮNG Đứng còn tiêu biểu cho những ung nhọt trong gia đình,con cái hư hỏng,những chuyện tày trời bị phát giác,hoặc có cãi vã với người trong thân tộc thành to chuyện.
PHÁO TRẮNG N : PHÁO TRẮNG Ngược đầu là sự phát giác đúng lúc mọi vấn đề,chưa xảy ra,hoặc vừa xảy ra nhưng ngăn chặn kịp thời nên thu xếp ổn thỏa.

CHỐT ĐỎ Đ : Lá CHỐT ĐỎ Đứng là cánh nhạn từ xa mang tin về,mang tin lành hứa hẹn mối duyên lành tràn ngập hạnh phúc.
Nếu người xin quẻ là thiếu nữ sẽ gặp được chàng trai,tuy ban đầu lạ lẫm nhưng trở thành quen sau đó không buộc mà nên không thắt mà thành người trai lạ ấy sẽ là ý trung nhân của thiếu nữ.Nếu người xin quẻ là 1 thanh niên những lá thư mang tin đến từ người bạn gái năm xưa học cùng lớp,cùng trường lâu ngày không gặp bỗng tình cờ tin nhạn bay về và từ đó trở thành duyên nợ.
Lá CHỐT ĐỎ Đứng còn báo trước cuộc thăm viếng bất ngờ của người bạn thân lâu năm xa cách khiến lòng người xin quẻ nhiều phen ray rức,như mong ai,chờ ai mà vẫn bặt tin tức.Nay tình cờ người bạn thân ấy trở lại,cuộc gặp gỡ là cuộc tao phùng,mọi nỗi lòng đều được thổ lộ cùng nhau,duyên thắm từ đó thành tựu 1 cách cao đẹp.

CHỐT ĐỎ N : Lá CHỐT ĐỎ Ngược đầu là lá bài tiên đoán sự hối tiếc to tát.Từ sự hối tiếc này đưa đến ân hận tràn ngập vì đã trót lỡ lầm trong quá khứ,trong phút say đắm,mê muội đã chấp nhận cuộc hôn nhân thiếu thành thật và ngày giờ này sự thiếu thành thật đó bộc lộ rõ rệt.

    function extractData() {
        const inputs = document.querySelectorAll('.card-input');
        const resultArea = document.getElementById('result-area');
        let finalResults = [];
        const lines = DATABASE.split('\n');

        inputs.forEach(input => {
            let val = input.value.trim();
            if (!val) return;

            // Quy tắc: Lấy Tên + Màu + Ký hiệu (Ví dụ: NGỰA VÀNG Đ)
            let searchKey = val.replace(/^\d+\s*[:.-]\s*/, "").trim().toUpperCase();
            
            let foundIdx = -1;
            for (let i = 0; i < lines.length; i++) {
                // Phải khớp 100% cụm từ tìm kiếm trước dấu hai chấm
                if (lines[i].toUpperCase().includes(searchKey + " :")) {
                    foundIdx = i;
                    break;
                }
            }

            if (foundIdx !== -1) {
                let segment = [];
                segment.push(lines[foundIdx]); // Lấy dòng gốc

                for (let j = foundIdx + 1; j < lines.length; j++) {
                    let lineText = lines[j].trim();
                    if (lineText === "") continue;

                    // QUY TẮC BẮT BUỘC: 
                    // Nếu dòng này chứa dấu " : " mang ý nghĩa là một lá bài khác
                    if (lineText.includes(" : ")) {
                        let potentialKey = lineText.split(" : ")[0].trim().toUpperCase();
                        
                        // Nếu Tên lá bài ở dòng này KHÁC 100% với searchKey -> DỪNG NGAY
                        if (potentialKey !== searchKey) {
                            break;
                        }
                    }
                    
                    // Nếu gặp dòng tiêu đề nhóm (ví dụ: 4. PHÁO ĐỎ) -> DỪNG NGAY
                    if (/^\d+\./.test(lineText)) {
                        break;
                    }

                    segment.push(lines[j]);
                }
                finalResults.push(segment.join('\n').trim());
            } else {
                finalResults.push("❌ KHÔNG KHỚP DỮ LIỆU: " + val);
            }
        });

        resultArea.innerText = finalResults.join("\n\n--------------------\n\n");
    }

    function copyData() {
        const text = document.getElementById('result-area').innerText;
        if (!text) return;
        const el = document.createElement('textarea');
        el.value = text;
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
        alert("Đã sao chép!");
    }
</script>

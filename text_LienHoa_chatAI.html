<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quẻ Tượng Xuyên Tâm - Sophie Meisam</title>
    <style>
        :root { --gold: #f1c40f; --dark: #121212; --card: #1e1e1e; }
        body { font-family: -apple-system, sans-serif; background: var(--dark); color: #fff; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 500px; background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .col { display: flex; flex-direction: column; gap: 10px; }
        input { padding: 12px; border: 1px solid #444; border-radius: 10px; background: #000; color: #fff; text-align: center; font-size: 1rem; width: 100%; box-sizing: border-box; }
        
        .preview-area { 
            background: #000; border: 1px solid #444; padding: 40px 10px; margin: 20px 0; border-radius: 12px;
            font-size: 1.4rem; line-height: 1.8; white-space: pre; 
            font-family: "Courier New", Courier, monospace;
            display: flex; justify-content: center; color: #ffffff;
            text-align: center;
        }

        .btn-copy { 
            width: 100%; padding: 18px; background: var(--gold); color: #000; 
            border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1rem;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="grid-inputs">
        <div class="col"><input type="text" id="q1u" value="Tốn"><input type="text" id="q1l" value="Chấn"></div>
        <div class="col"><input type="text" id="q2u" value="Cấn"><input type="text" id="q2l" value="Ly"></div>
        <div class="col"><input type="text" id="q3u" value="Tốn"><input type="text" id="q3l" value="Cấn"></div>
    </div>
    <div id="preview" class="preview-area"></div>
    <button class="btn-copy" onclick="copyResult()">SAO CHÉP HỆ QUẺ XUYÊN TÂM</button>
</div>

<script>
    const ids = ['q1u', 'q1l', 'q2u', 'q2l', 'q3u', 'q3l'];
    ids.forEach(id => document.getElementById(id).addEventListener('input', updatePreview));

    // Hàm căn tâm sử dụng Ideographic Space để ép độ rộng cố định
    function perfectCenter(str) {
        let text = str.trim();
        // Cấu trúc: [Khoảng trắng rộng] [Chữ] [Khoảng trắng rộng]
        // Ký tự \u3000 là khoảng trắng có độ rộng bằng 1 chữ Kanji/Hán tự, rất ổn định
        return "\u3000" + text + "\u3000";
    }

    function updatePreview() {
        const v = ids.map(id => document.getElementById(id).value || " ");
        
        // Căn lề từng chữ một cách thủ công để tạo trục thẳng đứng
        const row0 = perfectCenter("Chính") + " " + perfectCenter("Hỗ") + " " + perfectCenter("Biến");
        const rowAxis = perfectCenter("|") + " " + perfectCenter("|") + " " + perfectCenter("|");
        const row1 = perfectCenter(v[0]) + " " + perfectCenter(v[2]) + " " + perfectCenter(v[4]);
        const row2 = perfectCenter(v[1]) + " " + perfectCenter(v[3]) + " " + perfectCenter(v[5]);

        document.getElementById('preview').innerText = row0 + "\n" + rowAxis + "\n" + row1 + "\n" + row2;
    }

    function copyResult() {
        const text = document.getElementById('preview').innerText;
        navigator.clipboard.writeText(text).then(() => {
            alert("Đã sao chép! Trục sẽ thẳng hàng dù dán vào bất kỳ đâu.");
        });
    }
    updatePreview();
</script>
</body>
</html>

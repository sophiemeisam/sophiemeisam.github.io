<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quẻ Tượng Chính Hỗ Biến - Tối Giản</title>
    <style>
        :root { --gold: #f1c40f; --dark: #121212; --card: #1e1e1e; }
        body { font-family: -apple-system, sans-serif; background: var(--dark); color: #fff; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 450px; background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        input { padding: 12px; border: 1px solid #444; border-radius: 10px; background: #000; color: #fff; text-align: center; font-size: 1rem; width: 100%; box-sizing: border-box; }
        
        .preview-area { 
            background: #000; border: 1px solid #444; padding: 40px 10px; margin: 20px 0; border-radius: 12px;
            font-size: 1.5rem; line-height: 2; white-space: pre; 
            font-family: "Courier New", Courier, monospace;
            display: flex; justify-content: center; color: #ffffff;
        }

        .btn-copy { 
            width: 100%; padding: 18px; background: var(--gold); color: #000; 
            border: none; border-radius: 12px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="grid-inputs">
        <div class="col"><input type="text" id="q1u" value="Tốn"><input type="text" id="q1l" value="Chấn"></div>
        <div class="col"><input type="text" id="q2u" value="Cấn"><input type="text" id="q2l" value="Ly"></div>
        <div class="col"><input type="text" id="q3u" value="Tốn"><input type="text" id="q3l" value="Cấn"></div>
    </div>
    <div id="preview" class="preview-area"></div>
    <button class="btn-copy" onclick="copyResult()">SAO CHÉP VĂN BẢN</button>
</div>

<script>
    const ids = ['q1u', 'q1l', 'q2u', 'q2l', 'q3u', 'q3l'];
    ids.forEach(id => document.getElementById(id).addEventListener('input', updatePreview));

    function cleanCenter(str, width) {
        let text = str.trim();
        let diff = width - text.length;
        if (diff <= 0) return text;

        let left = Math.floor(diff / 2);
        let right = diff - left;
        
        // Sử dụng khoảng trắng tiêu chuẩn nhưng với độ rộng cột hẹp hơn (9) 
        // để giảm thiểu sai số khi dán vào font chữ biến thiên của Note
        return " ".repeat(left) + text + " ".repeat(right);
    }

    function updatePreview() {
        const v = ids.map(id => document.getElementById(id).value || " ");
        const W = 11; 
        const GAP = "  "; 

        const row0 = cleanCenter("Chính", W) + GAP + cleanCenter("Hỗ", W) + GAP + cleanCenter("Biến", W);
        const row1 = cleanCenter(v[0], W) + GAP + cleanCenter(v[2], W) + GAP + cleanCenter(v[4], W);
        const row2 = cleanCenter(v[1], W) + GAP + cleanCenter(v[3], W) + GAP + cleanCenter(v[5], W);

        document.getElementById('preview').innerText = row0 + "\n" + row1 + "\n" + row2;
    }

    function copyResult() {
        const text = document.getElementById('preview').innerText;
        navigator.clipboard.writeText(text).then(() => alert("Đã sao chép!"));
    }
    updatePreview();
</script>
</body>
</html>

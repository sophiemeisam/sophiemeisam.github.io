<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mô Phỏng Quẻ Tượng - Sophie Meisam</title>
    <style>
        :root { --gold: #f1c40f; --dark: #121212; --card: #1e1e1e; }
        body { font-family: -apple-system, sans-serif; background: var(--dark); color: #fff; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .container { width: 100%; max-width: 480px; background: var(--card); padding: 25px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.4); border: 1px solid #333; }
        h2 { color: var(--gold); text-align: center; margin-bottom: 25px; font-weight: 300; }
        
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .col { display: flex; flex-direction: column; gap: 8px; }
        .label-sm { font-size: 0.75rem; color: var(--gold); text-align: center; font-weight: bold; opacity: 0.8; }
        input { padding: 12px; border: 1px solid #444; border-radius: 10px; background: #111; color: #fff; text-align: center; font-size: 1rem; width: 100%; box-sizing: border-box; }
        input:focus { border-color: var(--gold); outline: none; }
        
        .preview-area { 
            background: #000; 
            border: 1px solid #444; 
            padding: 30px 5px; 
            margin: 20px 0; 
            border-radius: 12px;
            font-size: 1.5rem;
            line-height: 1.8;
            white-space: pre; 
            font-family: "Courier New", Courier, monospace; /* QUAN TRỌNG NHẤT */
            display: flex;
            justify-content: center;
            color: #ffffff;
        }

        .btn-copy { 
            width: 100%; padding: 18px; background: var(--gold); color: #000; 
            border: none; border-radius: 12px; font-weight: bold; font-size: 1.1rem;
            cursor: pointer; transition: all 0.3s ease;
        }
        .btn-copy.success { background: #27ae60; color: #fff; }
    </style>
</head>
<body>

<div class="container">
    <h2>Mô Phỏng Quẻ Tượng</h2>
    
    <div class="grid-inputs">
        <div class="col">
            <span class="label-sm">MỤC C</span>
            <input type="text" id="q1u" value="Tốn">
            <input type="text" id="q1l" value="Chấn">
        </div>
        <div class="col">
            <span class="label-sm">MỤC H</span>
            <input type="text" id="q2u" value="Cấn">
            <input type="text" id="q2l" value="Ly">
        </div>
        <div class="col">
            <span class="label-sm">MỤC B</span>
            <input type="text" id="q3u" value="Tốn">
            <input type="text" id="q3l" value="Cấn">
        </div>
    </div>

    <div id="preview" class="preview-area"></div>

    <button id="btnCopy" class="btn-copy" onclick="copyResult()">SAO CHÉP ĐỊNH DẠNG</button>
</div>

<script>
    const ids = ['q1u', 'q1l', 'q2u', 'q2l', 'q3u', 'q3l'];
    ids.forEach(id => document.getElementById(id).addEventListener('input', updatePreview));

    function formatAlignCenter(str, targetLen) {
        let text = str.trim();
        let diff = targetLen - text.length;
        
        if (diff <= 0) return text;
        
        // Tính toán khoảng trắng hai bên để ép chữ vào giữa trục
        let left = Math.floor(diff / 2);
        let right = diff - left;
        
        return " ".repeat(left) + text + " ".repeat(right);
    }

    function updatePreview() {
        const vals = ids.map(id => document.getElementById(id).value || " ");
        // Tăng COL_W lên 16 để tạo khoảng cách an toàn rộng hơn giữa các mục
        const COL_W = 16; 

        const row0 = formatAlignCenter("C", COL_W) + formatAlignCenter("H", COL_W) + formatAlignCenter("B", COL_W);
        const row1 = formatAlignCenter(vals[0], COL_W) + formatAlignCenter(vals[2], COL_W) + formatAlignCenter(vals[4], COL_W);
        const row2 = formatAlignCenter(vals[1], COL_W) + formatAlignCenter(vals[3], COL_W) + formatAlignCenter(vals[5], COL_W);

        document.getElementById('preview').innerText = row0 + "\n" + row1 + "\n" + row2;
    }

    function copyResult() {
        const text = document.getElementById('preview').innerText;
        const btn = document.getElementById('btnCopy');

        navigator.clipboard.writeText(text).then(() => {
            const originalText = btn.innerText;
            btn.innerText = "ĐÃ SAO CHÉP!";
            btn.classList.add('success');
            setTimeout(() => {
                btn.innerText = originalText;
                btn.classList.remove('success');
            }, 1500);
        });
    }

    updatePreview();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mô Phỏng Quẻ Tượng Chuẩn - Sophie Meisam</title>
    <style>
        :root { --gold: #f1c40f; --dark: #1a1a1a; --text: #eee; }
        body { font-family: -apple-system, sans-serif; background: var(--dark); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .container { width: 100%; max-width: 500px; background: #262626; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #444; }
        h2 { color: var(--gold); text-align: center; margin-bottom: 20px; font-size: 1.3rem; }
        
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .col { display: flex; flex-direction: column; gap: 8px; }
        input { padding: 10px; border: 1px solid #555; border-radius: 8px; background: #1a1a1a; color: white; text-align: center; font-size: 0.95rem; width: 100%; box-sizing: border-box; }
        input:focus { border-color: var(--gold); outline: none; }
        
        .label-sm { font-size: 0.8rem; color: var(--gold); text-align: center; font-weight: bold; margin-bottom: 2px; }

        .preview-area { 
            background: #000; 
            border: 1px solid var(--gold); 
            padding: 30px 10px; 
            margin: 20px 0; 
            border-radius: 10px;
            font-size: 1.5rem;
            line-height: 1.6;
            white-space: pre; 
            font-family: "Courier New", Courier, monospace; /* Font đơn cách bắt buộc để căn lề */
            display: flex;
            justify-content: center;
            color: #fff;
        }

        .btn-copy { 
            width: 100%; padding: 15px; background: var(--gold); color: #000; 
            border: none; border-radius: 10px; font-weight: bold; font-size: 1rem;
            cursor: pointer; transition: 0.2s;
        }
        .btn-copy:hover { background: #d4af37; }
    </style>
</head>
<body>

<div class="container">
    <h2>Mô Phỏng Quẻ Tượng</h2>
    
    <div class="grid-inputs">
        <div class="col">
            <span class="label-sm">Mục C</span>
            <input type="text" id="q1u" value="Tốn">
            <input type="text" id="q1l" value="Ly">
        </div>
        <div class="col">
            <span class="label-sm">Mục H</span>
            <input type="text" id="q2u" value="Ly">
            <input type="text" id="q2l" value="Khảm">
        </div>
        <div class="col">
            <span class="label-sm">Mục B</span>
            <input type="text" id="q3u" value="Tốn">
            <input type="text" id="q3l" value="Kiền">
        </div>
    </div>

    <div id="preview" class="preview-area"></div>

    <button class="btn-copy" onclick="copyResult()">SAO CHÉP ĐỊNH DẠNG CĂN GIỮA</button>
</div>

<script>
    const inputs = document.querySelectorAll('input');
    inputs.forEach(input => input.addEventListener('input', updatePreview));

    function formatAlignCenter(str, targetLen) {
        let text = str.trim();
        if (text.length >= targetLen) return text;
        
        let totalSpaces = targetLen - text.length;
        let leftSpaces = Math.floor(totalSpaces / 2);
        let rightSpaces = totalSpaces - leftSpaces;
        
        return " ".repeat(leftSpaces) + text + " ".repeat(rightSpaces);
    }

    function updatePreview() {
        const q1u = document.getElementById('q1u').value || " ";
        const q1l = document.getElementById('q1l').value || " ";
        const q2u = document.getElementById('q2u').value || " ";
        const q2l = document.getElementById('q2l').value || " ";
        const q3u = document.getElementById('q3u').value || " ";
        const q3l = document.getElementById('q3l').value || " ";

        const COL_W = 12; // Độ rộng cố định cho mỗi cột để đảm bảo căn giữa chính xác

        // Dòng 1: Ký hiệu C - H - B
        const row0 = formatAlignCenter("C", COL_W) + formatAlignCenter("H", COL_W) + formatAlignCenter("B", COL_W);
        // Dòng 2: Quẻ trên
        const row1 = formatAlignCenter(q1u, COL_W) + formatAlignCenter(q2u, COL_W) + formatAlignCenter(q3u, COL_W);
        // Dòng 3: Quẻ dưới
        const row2 = formatAlignCenter(q1l, COL_W) + formatAlignCenter(q2l, COL_W) + formatAlignCenter(q3l, COL_W);

        document.getElementById('preview').innerText = row0 + "\n" + row1 + "\n" + row2;
    }

    function copyResult() {
        const text = document.getElementById('preview').innerText;
        navigator.clipboard.writeText(text).then(() => {
            alert("Đã sao chép! Các mục đã được căn giữa trục dọc.");
        });
    }

    updatePreview(); // Khởi tạo
</script>

</body>
</html>

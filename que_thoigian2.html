<!DOCTYPE html>  <html lang="vi">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">  
    <title>Kỹ Thuật H:M Quẻ Thời Gian & Xuất Ảnh</title>  
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600&display=swap" rel="stylesheet">  
    <style>  
        :root { --primary: #993300; --secondary: #007aff; --bg: #f0f2f5; }  
        body { background: var(--bg); font-family: 'Lexend', sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }  
        .container { width: 100%; max-width: 500px; background: #fff; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; margin-bottom: 20px; }  
        .header { background: var(--primary); color: white; padding: 20px; text-align: center; font-weight: 600; font-size: 1.2rem; }  
        .clock-section { text-align: center; padding: 20px; background: #fffaf0; border-bottom: 1px solid #eee; }  
        #currentTime { font-size: 3.2rem; font-weight: bold; color: #2d3436; margin: 0; }  
        .date-text { color: #636e72; font-size: 0.85rem; }  
        .action-area { padding: 20px; display: flex; flex-direction: column; gap: 15px; }  
        .btn-main { background: var(--primary); color: white; width: 100%; padding: 16px; border: none; border-radius: 15px; font-weight: bold; font-size: 1.1rem; cursor: pointer; box-shadow: 0 4px 12px rgba(153,51,0,0.2); }  
        .btn-main:active { transform: scale(0.98); }  .manual-input { background: #f9f9f9; padding: 15px; border-radius: 15px; border: 1px dashed #ccc; text-align: center; }  
    .input-group { display: flex; justify-content: center; align-items: center; gap: 10px; margin-bottom: 12px; }  
    .input-group select { padding: 10px; border-radius: 8px; border: 1px solid #ddd; font-family: inherit; font-size: 1rem; }  
    .btn-sub { background: #636e72; color: white; border: none; padding: 10px; border-radius: 10px; width: 100%; font-weight: 600; cursor: pointer; }  

    .result-panel { padding: 0 20px 20px 20px; display: none; }  
    .card { background: white; border: 1px solid #eee; border-radius: 15px; padding: 15px; margin-bottom: 15px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }  
    .card-label { font-size: 0.75rem; font-weight: bold; color: #888; text-transform: uppercase; display: block; margin-bottom: 10px; }  
    .que-name { font-size: 1.5rem; font-weight: 800; color: var(--primary); margin: 5px 0; }  

    .hexagram { display: flex; flex-direction: column-reverse; gap: 8px; align-items: center; margin: 15px 0; }  
    .line { width: 100px; height: 10px; background-color: var(--primary); border-radius: 2px; }  
    .line.broken { background-color: transparent; display: flex; justify-content: space-between; }  
    .line.broken::before, .line.broken::after { content: ""; width: 42%; height: 100%; background-color: var(--primary); border-radius: 2px; }  

    .binary-tag { font-family: monospace; font-size: 0.8rem; background: #eee; padding: 3px 10px; border-radius: 10px; color: #555; }  
    .export-section { margin-top: 10px; border-top: 1px dashed #ccc; padding-top: 15px; }  
    textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-family: inherit; font-size: 14px; box-sizing: border-box; resize: none; }  
    .btn-download { background: var(--secondary); color: white; width: 100%; padding: 12px; border: none; border-radius: 50px; font-weight: bold; margin-top: 10px; cursor: pointer; }  
    canvas#hiddenCanvas { display: none; }  

    /* Style cho 2 button mới thêm */
    .ai-buttons-container { width: 100%; max-width: 500px; display: flex; gap: 10px; margin-top: 10px; }
    .btn-ai { flex: 1; padding: 18px; border: none; border-radius: 15px; font-weight: 800; font-size: 1.3rem; cursor: pointer; text-decoration: none; text-align: center; color: white; transition: opacity 0.3s; }
    .btn-ai-1 { background: #2c3e50; }
    .btn-ai-2 { background: #8e44ad; }
    .btn-ai:hover { opacity: 0.9; }
</style>

</head>  
<body>  
<div class="container">  
    <div class="header">KỸ THUẬT H:M LẬP QUẺ THỜI GIAN</div>  
    <div class="clock-section">  
        <div id="currentTime">00:00</div>  
        <div id="currentDate" class="date-text">--</div>  
    </div>  
    <div class="action-area">  
        <button class="btn-main" onclick="lapQue(true)">LẬP QUẺ THEO GIỜ THỰC</button>  
        <div class="manual-input">  
            <div class="input-group">  
                <select id="manHH"></select> <span>:</span>  
                <select id="manMM"></select>  
            </div>  
            <button class="btn-sub" onclick="lapQue(false)">LẬP QUẺ THỦ CÔNG</button>  
        </div>  
    </div>  
    <div class="result-panel" id="resultPanel">  
        <div class="card">  
            <span class="card-label">Quẻ Chủ</span>  
            <div id="nameChu" class="que-name">---</div>  
            <div id="visualChu" class="hexagram"></div>  
            <div id="codeChu" class="binary-tag">---</div>  
        </div>  
        <div class="card">  
            <span class="card-label">Quẻ Biến</span>  
            <div id="nameBien" class="que-name">---</div>  
            <div id="visualBien" class="hexagram"></div>  
            <div id="codeBien" class="binary-tag">---</div>  
        </div>  
        <div class="export-section">  
            <textarea id="qTxt" rows="2" placeholder="Gõ câu hỏi tại đây..."></textarea>  
            <button class="btn-download" onclick="exportImage()">💾 TẢI ẢNH KẾT QUẢ</button>  
        </div>  
    </div>  
</div>  

<div class="ai-buttons-container">
    <a href="https://example.com/ai1" target="_blank" class="btn-ai btn-ai-1">AI 1</a>
    <a href="https://chatgpt.com/share/69c36e54-d6a0-839f-8271-bfd6c1921fcd" target="_blank" class="btn-ai btn-ai-2">AI 2</a>
</div>

<canvas id="hiddenCanvas"></canvas>  <script>  
    const batQuai = {  
        1: { name: "Kiền", code: "111" }, 2: { name: "Đoài", code: "011" },  
        3: { name: "Ly",    code: "101" }, 4: { name: "Chấn",  code: "001" },  
        5: { name: "Tốn",   code: "110" }, 6: { name: "Khảm",  code: "010" },  
        7: { name: "Cấn",   code: "100" }, 8: { name: "Khôn",  code: "000" }  
    };  
  
    const data64Que = {  
        "111111": "Thuần Càn", "000000": "Thuần Khôn", "010001": "Thủy Lôi Truân", "100010": "Sơn Thủy Mông",  
        "010111": "Thủy Thiên Nhu", "111010": "Thiên Thủy Tụng", "000010": "Địa Thủy Sư", "010000": "Thủy Địa Tỷ",  
        "110111": "Phong Thiên Tiểu Súc", "111011": "Thiên Trạch Lý", "000111": "Địa Thiên Thái", "111000": "Thiên Địa Bĩ",  
        "111101": "Thiên Hỏa Đồng Nhân", "101111": "Hỏa Thiên Đại Hữu", "000100": "Địa Sơn Khiêm", "001000": "Lôi Địa Dự",  
        "011001": "Trạch Lôi Tùy", "100110": "Sơn Phong Cổ", "000011": "Địa Trạch Lâm", "110000": "Phong Địa Quán",  
        "101001": "Hỏa Lôi Phệ Hạp", "100101": "Sơn Hỏa Bí", "100000": "Sơn Địa Bác", "000001": "Địa Lôi Phục",  
        "111001": "Thiên Lôi Vô Vọng", "100111": "Sơn Thiên Đại Súc", "100001": "Sơn Lôi Di", "011110": "Trạch Phong Đại Quá",  
        "010010": "Thuần Khảm", "101101": "Thuần Ly", "011100": "Trạch Sơn Hàm", "001110": "Lôi Phong Hằng",  
        "111100": "Thiên Sơn Độn", "001111": "Lôi Thiên Đại Tráng", "101000": "Hỏa Địa Tấn", "000101": "Địa Hỏa Minh Di",  
        "110101": "Phong Hỏa Gia Nhân", "101011": "Hỏa Trạch Khuê", "010100": "Thủy Sơn Kiển", "001010": "Lôi Thủy Giải",  
        "100011": "Sơn Trạch Tổn", "110001": "Phong Lôi Ích", "011111": "Trạch Thiên Quải", "111110": "Thiên Phong Cấu",  
        "011000": "Trạch Địa Tụy", "000110": "Địa Phong Thăng", "011010": "Trạch Thủy Khốn", "010110": "Thủy Phong Tỉnh",  
        "011101": "Trạch Hỏa Cách", "101110": "Hỏa Phong Đỉnh", "001001": "Thuần Chấn", "100100": "Thuần Cấn",  
        "110100": "Phong Sơn Tiệm", "001011": "Lôi Trạch Quy Muội", "001101": "Lôi Hỏa Phong", "101100": "Hỏa Sơn Lữ",  
        "110110": "Thuần Tốn", "011011": "Thuần Đoài", "110010": "Phong Thủy Hoán", "010011": "Thủy Trạch Tiết",  
        "110011": "Phong Trạch Trung Phu", "001100": "Lôi Sơn Tiểu Quá", "010101": "Thủy Hỏa Ký Tế", "101010": "Hỏa Thủy Vị Tế"  
    };  
  
    const manHH = document.getElementById('manHH');  
    const manMM = document.getElementById('manMM');  
    for(let i=0; i<24; i++) manHH.innerHTML += `<option value="${i.toString().padStart(2,'0')}">${i.toString().padStart(2,'0')}</option>`;  
    for(let i=0; i<60; i++) manMM.innerHTML += `<option value="${i.toString().padStart(2,'0')}">${i.toString().padStart(2,'0')}</option>`;  
  
    function convertToQuaiNumber(val) {  
        let n = parseInt(val);  
        if (isNaN(n) || n === 0) return 8;  
        return n % 8 === 0 ? 8 : n % 8;  
    }  
  
    function drawHex(containerId, code) {  
        const container = document.getElementById(containerId);  
        container.innerHTML = "";  
        for (let i = 0; i < 6; i++) {  
            const line = document.createElement('div');  
            const isBroken = code[i] === '0';  
            line.className = isBroken ? "line broken" : "line";  
            container.appendChild(line);  
        }  
    }  
  
    function updateClock() {  
        const now = new Date();  
        document.getElementById('currentTime').innerText = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');  
        document.getElementById('currentDate').innerText = now.toLocaleDateString('vi-VN', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });  
    }  
    setInterval(updateClock, 1000);  
    updateClock();  
  
    let saveMeta = {};  
  
    function lapQue(isRealTime) {  
        let hh, mm;  
        if (isRealTime) {  
            const now = new Date();  
            hh = now.getHours().toString().padStart(2, '0');  
            mm = now.getMinutes().toString().padStart(2, '0');  
        } else {  
            hh = manHH.value;  
            mm = manMM.value;  
        }  
  
        const X = hh[0], Xp = hh[1], Y = mm[0], Yp = mm[1];  
        const chuT = convertToQuaiNumber(X), chuH = convertToQuaiNumber(Y);  
        const bienT = convertToQuaiNumber(Xp), bienH = convertToQuaiNumber(Yp);  
  
        const codeChu = batQuai[chuT].code + batQuai[chuH].code;  
        const codeBien = batQuai[bienT].code + batQuai[bienH].code;  
  
        document.getElementById('resultPanel').style.display = 'block';  
        document.getElementById('nameChu').innerText = data64Que[codeChu];  
        document.getElementById('codeChu').innerText = `${batQuai[chuT].name}/${batQuai[chuH].name}`;  
        drawHex('visualChu', codeChu);  
  
        document.getElementById('nameBien').innerText = data64Que[codeBien];  
        document.getElementById('codeBien').innerText = `${batQuai[bienT].name}/${batQuai[bienH].name}`;  
        drawHex('visualBien', codeBien);  
  
        saveMeta = { time: `${hh}:${mm}`, q1: data64Que[codeChu], q2: data64Que[codeBien], cChu: codeChu, cBien: codeBien, date: document.getElementById('currentDate').innerText };  
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });  
    }  
  
    function exportImage() {  
        const canvas = document.getElementById('hiddenCanvas');  
        const ctx = canvas.getContext('2d');  
        const qTxt = document.getElementById('qTxt').value || "Không có câu hỏi";  
  
        canvas.width = 600; canvas.height = 700;  
        ctx.fillStyle = "#ffffff"; ctx.fillRect(0, 0, 600, 700);  
  
        // Header  
        ctx.fillStyle = "#993300"; ctx.fillRect(0, 0, 600, 100);  
        ctx.fillStyle = "#ffffff"; ctx.font = "bold 28px Arial"; ctx.textAlign = "center";  
        ctx.fillText("KẾT QUẢ DỊCH LÝ THỜI GIAN", 300, 60);  
  
        // Time & Date  
        ctx.fillStyle = "#333"; ctx.font = "bold 22px Arial";  
        ctx.fillText(`Thời gian lập: ${saveMeta.time}`, 300, 140);  
        ctx.font = "16px Arial"; ctx.fillText(saveMeta.date, 300, 165);  
  
        // Vẽ Quẻ  
        function drawCanvasHex(x, y, code, name, isChu) {  
            ctx.fillStyle = "#993300"; ctx.font = "bold 24px Arial";  
            ctx.fillText(name, x + 65, y - 30);  
            ctx.font = "bold 14px Arial"; ctx.fillStyle = "#888";  
            ctx.fillText(isChu ? "QUẺ CHỦ" : "QUẺ BIẾN", x + 65, y - 60);  
  
            for (let i = 0; i < 6; i++) {  
                const isBroken = code[i] === '0';  
                ctx.fillStyle = "#993300";  
  
                if (isBroken) {  
                    ctx.fillRect(x, y + (i * 20), 55, 12);  
                    ctx.fillRect(x + 75, y + (i * 20), 55, 12);  
                } else {  
                    ctx.fillRect(x, y + (i * 20), 130, 12);  
                }  
            }  
        }  
  
        drawCanvasHex(80, 280, saveMeta.cChu, saveMeta.q1, true);  
        drawCanvasHex(390, 280, saveMeta.cBien, saveMeta.q2, false);  
  
        // Câu hỏi  
        ctx.fillStyle = "#f8f9fa"; ctx.fillRect(40, 480, 520, 120);  
        ctx.fillStyle = "#007aff"; ctx.font = "bold 20px Arial";  
        ctx.textAlign = "left";  
        const lines = qTxt.match(/.{1,45}(\s|$)/g) || [qTxt];  
        lines.forEach((l, i) => ctx.fillText(i === 0 ? "HỎI: " + l : l, 60, 530 + (i * 30)));  
  
        // Footer  
        ctx.fillStyle = "#aaa"; ctx.font = "12px Arial"; ctx.textAlign = "center";  
        ctx.fillText("Ứng dụng lập quẻ Thời Gian - 2026", 300, 680);  
  
        const link = document.createElement('a');  
        link.download = `ThoiGian_${saveMeta.time}.png`;  
        link.href = canvas.toDataURL();  
        link.click();  
    }  
</script>  </body>  
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bảng Quẻ Chuẩn Text</title>

<style>
:root { --gold:#f1c40f; --dark:#121212; --card:#1e1e1e; }

body {
    font-family: -apple-system, sans-serif;
    background: var(--dark);
    color: #fff;
    display: flex;
    justify-content: center;
    padding: 20px;
}

.container {
    width: 100%;
    max-width: 600px;
    background: var(--card);
    padding: 20px;
    border-radius: 16px;
}

.grid-inputs {
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 10px;
}

.col {
    display: flex;
    flex-direction: column;
    gap: 5px;
}

input {
    padding: 10px;
    text-align: center;
    border-radius: 8px;
    border: 1px solid #444;
    background: #000;
    color: #fff;
}

.preview {
    margin-top: 20px;
    padding: 15px;
    background: #000;
    border-radius: 10px;
    white-space: pre;
    font-size: 16px;
}

button {
    margin-top: 10px;
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 10px;
    background: var(--gold);
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

<div class="grid-inputs">
    <div class="col">
        <input id="q1u" value="Tốn">
        <input id="q1l" value="Chấn">
    </div>
    <div class="col">
        <input id="q2u" value="Cấn">
        <input id="q2l" value="Ly">
    </div>
    <div class="col">
        <input id="q3u" value="Tốn">
        <input id="q3l" value="Cấn">
    </div>
</div>

<div id="preview" class="preview"></div>

<button onclick="copyText()">Copy không lệch</button>

</div>

<script>

const ids = ['q1u','q1l','q2u','q2l','q3u','q3l'];
ids.forEach(id => document.getElementById(id).addEventListener('input', update));

function buildTable(){
    const v = ids.map(id => document.getElementById(id).value || " ");

    const headers = ["Chính","Hỗ","Biến"];

    const data = [
        headers,
        [v[0], v[2], v[4]],
        [v[1], v[3], v[5]]
    ];

    // auto width từng cột
    const colWidths = headers.map((_, i) =>
        Math.max(...data.map(row => row[i].length))
    );

    const pad = (text, w) => text.padEnd(w, " ");

    // dòng header
    const headerRow = data[0].map((cell, i) => pad(cell, colWidths[i])).join(" | ");

    // dòng phân cách
    const separator = colWidths.map(w => "-".repeat(w)).join("-+-");

    // dòng dữ liệu
    const row1 = data[1].map((cell, i) => pad(cell, colWidths[i])).join(" | ");
    const row2 = data[2].map((cell, i) => pad(cell, colWidths[i])).join(" | ");

    return headerRow + "\n" + separator + "\n" + row1 + "\n" + row2;
}

function update(){
    document.getElementById("preview").innerText = buildTable();
}

function copyText(){
    const text = buildTable();
    navigator.clipboard.writeText(text);
    alert("Đã copy! Dán đâu cũng không lệch 👍");
}

update();

</script>

</body>
</html>

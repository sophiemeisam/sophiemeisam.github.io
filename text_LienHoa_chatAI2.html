<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quẻ Liên Hoa - 1 Input</title>

<style>
:root { --gold:#f1c40f; --dark:#121212; --card:#1e1e1e; }

body {
    font-family: -apple-system, sans-serif;
    background: var(--dark);
    color: #fff;
    display: flex;
    justify-content: center;
    padding: 20px;
}

.container {
    width: 100%;
    max-width: 600px;
    background: var(--card);
    padding: 20px;
    border-radius: 16px;
}

input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #444;
    background: #000;
    color: #fff;
    text-align: center;
    font-size: 16px;
}

.preview {
    margin-top: 20px;
    padding: 15px;
    background: #000;
    border-radius: 10px;
    white-space: pre;
    font-size: 16px;
}

button {
    margin-top: 10px;
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 10px;
    background: var(--gold);
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

<input id="input" placeholder="VD: Tốn, Chấn, Cấn, Ly, Tốn, Cấn">

<div id="preview" class="preview"></div>

<button onclick="copyText()">Copy không lệch</button>

</div>

<script>

const headers = ["Chính","Hỗ","Biến"];

document.getElementById("input").addEventListener("input", update);

function parseInput(str){
    return str.split(",").map(s => s.trim()).filter(s => s);
}

function buildTable(arr){

    // đảm bảo đủ 6 phần tử
    while(arr.length < 6) arr.push("");

    const data = [
        headers,
        [arr[0], arr[2], arr[4]],
        [arr[1], arr[3], arr[5]]
    ];

    // auto width
    const colWidths = headers.map((_, i) =>
        Math.max(...data.map(row => row[i].length))
    );

    const pad = (text, w) => text.padEnd(w, " ");

    const headerRow = data[0].map((c,i)=>pad(c,colWidths[i])).join(" | ");
    const separator = colWidths.map(w => "-".repeat(w)).join("-+-");
    const row1 = data[1].map((c,i)=>pad(c,colWidths[i])).join(" | ");
    const row2 = data[2].map((c,i)=>pad(c,colWidths[i])).join(" | ");

    return headerRow + "\n" + separator + "\n" + row1 + "\n" + row2;
}

function update(){
    const input = document.getElementById("input").value;
    const arr = parseInput(input);
    document.getElementById("preview").innerText = buildTable(arr);
}

function copyText(){
    const text = document.getElementById("preview").innerText;
    navigator.clipboard.writeText(text);
    alert("Đã copy! 👍");
}

update();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liên Hoa Quẻ - Chuẩn Text Pro</title>

<style>
:root { --gold:#f1c40f; --dark:#121212; --card:#1e1e1e; }

body {
    font-family: -apple-system, sans-serif;
    background: var(--dark);
    color: #fff;
    display: flex;
    justify-content: center;
    padding: 20px;
}

.container {
    width: 100%;
    max-width: 700px;
    background: var(--card);
    padding: 20px;
    border-radius: 16px;
}

.grid-inputs {
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 10px;
}

.col {
    display: flex;
    flex-direction: column;
    gap: 5px;
}

input {
    padding: 10px;
    text-align: center;
    border-radius: 8px;
    border: 1px solid #444;
    background: #000;
    color: #fff;
}

.preview {
    margin-top: 20px;
    padding: 15px;
    background: #000;
    border-radius: 10px;
    white-space: pre;
    font-size: 16px;
}

button {
    margin-top: 10px;
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 10px;
    background: var(--gold);
    font-weight: bold;
}

.toggle {
    margin-top: 10px;
    text-align: center;
}
</style>
</head>

<body>

<div class="container">

<div class="grid-inputs" id="grid"></div>

<div class="toggle">
    <label>
        <input type="checkbox" id="iconToggle"> Hiển thị quái ☴ ☳ ☶ ☲
    </label>
</div>

<div id="preview" class="preview"></div>

<button onclick="copyText()">Copy không lệch</button>

</div>

<script>

// ====== CONFIG ======
const columns = ["Chính","Hỗ","Biến"]; // có thể đổi thành 5-7 cột
const trigramMap = {
    "Càn":"☰","Đoài":"☱","Ly":"☲","Chấn":"☳",
    "Tốn":"☴","Khảm":"☵","Cấn":"☶","Khôn":"☷"
};

// ====== INIT INPUT ======
const grid = document.getElementById("grid");

columns.forEach((col, i) => {
    const div = document.createElement("div");
    div.className = "col";

    const inputU = document.createElement("input");
    inputU.id = `q${i}u`;
    inputU.value = ["Tốn","Cấn","Tốn"][i] || "";

    const inputL = document.createElement("input");
    inputL.id = `q${i}l`;
    inputL.value = ["Chấn","Ly","Cấn"][i] || "";

    div.appendChild(inputU);
    div.appendChild(inputL);
    grid.appendChild(div);
});

// ====== BUILD TABLE ======
function buildTable(){
    const showIcon = document.getElementById("iconToggle").checked;

    const upper = [];
    const lower = [];

    columns.forEach((_, i) => {
        let u = document.getElementById(`q${i}u`).value.trim();
        let l = document.getElementById(`q${i}l`).value.trim();

        if(showIcon){
            u = (trigramMap[u] || "") + " " + u;
            l = (trigramMap[l] || "") + " " + l;
        }

        upper.push(u);
        lower.push(l);
    });

    const data = [
        columns,
        upper,
        lower
    ];

    // auto width từng cột
    const colWidths = columns.map((_, i) =>
        Math.max(...data.map(row => row[i].length))
    );

    const pad = (text, w) => text.padEnd(w, " ");

    return data.map(row =>
        row.map((cell, i) => pad(cell, colWidths[i])).join(" | ")
    ).join("\n");
}

// ====== UPDATE ======
function update(){
    document.getElementById("preview").innerText = buildTable();
}

// ====== COPY ======
function copyText(){
    const text = buildTable();
    navigator.clipboard.writeText(text);
    alert("Đã copy! Dán đâu cũng không lệch 👍");
}

// ====== EVENTS ======
document.addEventListener("input", update);
document.getElementById("iconToggle").addEventListener("change", update);

update();

</script>

</body>
</html>

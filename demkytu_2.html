<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đếm ký tự PRO+</title>
<style>
  :root {
    --primary: #4a90e2;
    --bg: #f5f7fa;
    --card: #ffffff;
    --text: #333;
    --green: #2ecc71;
    --yellow: #f1c40f;
    --red: #e74c3c;
  }

  body { 
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
    padding: 20px; 
    background-color: var(--bg);
    color: var(--text);
    max-width: 800px;
    margin: 0 auto;
    line-height: 1.6;
  }

  h2 { color: var(--primary); text-align: center; margin-bottom: 25px; }

  .container {
    background: var(--card);
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.05);
  }

  textarea { 
    width: 100%; 
    height: 160px; 
    font-size: 16px; 
    padding: 15px;
    border: 2px solid #eee;
    border-radius: 10px;
    box-sizing: border-box;
    transition: border-color 0.3s;
    outline: none;
    resize: vertical;
  }

  textarea:focus { border-color: var(--primary); }

  button { 
    width: 100%;
    padding: 14px; 
    margin-top: 15px; 
    font-size: 16px; 
    font-weight: bold;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.3s;
  }

  button:active { transform: scale(0.98); }
  button:hover { opacity: 0.9; }

  #total { 
    margin: 25px 0 15px; 
    text-align: center; 
    font-size: 24px;
    color: var(--primary);
  }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 10px;
    margin-bottom: 25px;
  }

  .stat-card {
    padding: 10px;
    text-align: center;
    border-radius: 8px;
    font-weight: 500;
  }

  .one-card { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }
  .two-card { background: #fffde7; color: #f57f17; border: 1px solid #fff9c4; }
  .punct-card { background: #ffebee; color: #c62828; border: 1px solid #ffcdd2; }

  #output { 
    margin-top: 25px; 
    line-height: 2.2; 
    font-size: 18px; 
    background: white;
    padding: 15px;
    border-radius: 10px;
    min-height: 50px;
  }

  .char {
    padding: 0px 6px;
    margin: 2px;
    display: inline-block;
    border-radius: 4px;
    cursor: pointer;
    font-weight: 500;
  }

  .one { background: #d4edda; border-bottom: 2px solid #28a745; }
  .two { background: #ffeeba; border-bottom: 2px solid #ffc107; }
  .punct { background: #f8d7da; border-bottom: 2px solid #dc3545; }

</style>
</head>
<body>

<div class="container">
  <h2>Đếm ký tự PRO+</h2>

  <textarea id="inputText" placeholder="Nhập văn bản vào đây..."></textarea>
  <button onclick="analyze()">Phân tích ngay</button>

  <h3 id="total">Tổng: 0</h3>

  <div class="stats-grid">
    <div class="stat-card one-card">🟩 Loại 1: <span id="countOne">0</span></div>
    <div class="stat-card two-card">🟨 Loại 2: <span id="countTwo">0</span></div>
    <div class="stat-card punct-card">🟥 Dấu: <span id="countPunct">0</span></div>
  </div>

  <div id="output"></div>
</div>

<script>
// --- GIỮ NGUYÊN 100% THUẬT TOÁN GỐC ---
const toneMap = {
  'á':'a','à':'a','ả':'a','ã':'a','ạ':'a',
  'ắ':'ă','ằ':'ă','ẳ':'ă','ẵ':'ă','ặ':'ă',
  'ấ':'â','ầ':'â','ẩ':'â','ẫ':'â','ậ':'â',

  'é':'e','è':'e','ẻ':'e','ẽ':'e','ẹ':'e',
  'ế':'ê','ề':'ê','ể':'ê','ễ':'ê','ệ':'ê',

  'í':'i','ì':'i','ỉ':'i','ĩ':'i','ị':'i',

  'ó':'o','ò':'o','ỏ':'o','õ':'o','ọ':'o',
  'ố':'ô','ồ':'ô','ổ':'ô','ỗ':'ô','ộ':'ô',
  'ớ':'ơ','ờ':'ơ','ở':'ơ','ỡ':'ơ','ợ':'ơ',

  'ú':'u','ù':'u','ủ':'u','ũ':'u','ụ':'u',
  'ứ':'ư','ừ':'ư','ử':'ư','ữ':'ư','ự':'ư',

  'ý':'y','ỳ':'y','ỷ':'y','ỹ':'y','ỵ':'y'
};

function isPunctuation(char) {
  return /[.,?!&]/.test(char);
}

function analyze() {
  let text = document.getElementById("inputText").value;
  let output = document.getElementById("output");

  let total = 0;
  let countOne = 0;
  let countTwo = 0;
  let countPunct = 0;

  output.innerHTML = "";

  for (let char of text) {

    if (char.trim() === "") continue;

    let span = document.createElement("span");
    span.classList.add("char");

    if (toneMap[char]) {
      total += 2;
      countTwo++;
      span.classList.add("two");
      span.title = char + " = 2 (chữ + dấu thanh)";
    }
    else if (isPunctuation(char)) {
      total += 1;
      countPunct++;
      span.classList.add("punct");
      span.title = char + " = 1 (dấu câu)";
    }
    else {
      total += 1;
      countOne++;
      span.classList.add("one");
      span.title = char + " = 1";
    }

    span.innerText = char;
    output.appendChild(span);
  }

  document.getElementById("total").innerText = "Tổng: " + total;
  document.getElementById("countOne").innerText = countOne;
  document.getElementById("countTwo").innerText = countTwo;
  document.getElementById("countPunct").innerText = countPunct;
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đếm ký tự PRO+</title>
<style>
  body { font-family: Arial; padding: 20px; }
  textarea { width: 100%; height: 140px; font-size: 16px; }
  button { padding: 10px 20px; margin-top: 10px; font-size: 16px; }

  #output { margin-top: 20px; line-height: 2; font-size: 18px; }

  .char {
    padding: 2px 4px;
    margin: 1px;
    display: inline-block;
    border-radius: 4px;
    cursor: pointer;
  }

  .one { background: #d4edda; }   /* xanh */
  .two { background: #ffeeba; }   /* vàng */
  .punct { background: #f8d7da; } /* hồng */

  .stats {
    margin-top: 15px;
    font-size: 18px;
  }
</style>
</head>
<body>

<h2>Đếm ký tự PRO+</h2>

<textarea id="inputText"></textarea>
<br>
<button onclick="analyze()">Phân tích</button>

<h3 id="total">Tổng: 0</h3>

<div class="stats">
  🟩 Xanh (1 ký tự): <span id="countOne">0</span><br>
  🟨 Vàng (2 ký tự): <span id="countTwo">0</span><br>
  🟥 Hồng (dấu câu): <span id="countPunct">0</span>
</div>

<div id="output"></div>

<script>
const toneMap = {
  'á':'a','à':'a','ả':'a','ã':'a','ạ':'a',
  'ắ':'ă','ằ':'ă','ẳ':'ă','ẵ':'ă','ặ':'ă',
  'ấ':'â','ầ':'â','ẩ':'â','ẫ':'â','ậ':'â',

  'é':'e','è':'e','ẻ':'e','ẽ':'e','ẹ':'e',
  'ế':'ê','ề':'ê','ể':'ê','ễ':'ê','ệ':'ê',

  'í':'i','ì':'i','ỉ':'i','ĩ':'i','ị':'i',

  'ó':'o','ò':'o','ỏ':'o','õ':'o','ọ':'o',
  'ố':'ô','ồ':'ô','ổ':'ô','ỗ':'ô','ộ':'ô',
  'ớ':'ơ','ờ':'ơ','ở':'ơ','ỡ':'ơ','ợ':'ơ',

  'ú':'u','ù':'u','ủ':'u','ũ':'u','ụ':'u',
  'ứ':'ư','ừ':'ư','ử':'ư','ữ':'ư','ự':'ư',

  'ý':'y','ỳ':'y','ỷ':'y','ỹ':'y','ỵ':'y'
};

function isPunctuation(char) {
  return /[.,?!&]/.test(char);
}

function analyze() {
  let text = document.getElementById("inputText").value;
  let output = document.getElementById("output");

  let total = 0;
  let countOne = 0;
  let countTwo = 0;
  let countPunct = 0;

  output.innerHTML = "";

  for (let char of text) {

    if (char.trim() === "") continue;

    let span = document.createElement("span");
    span.classList.add("char");

    if (toneMap[char]) {
      total += 2;
      countTwo++;
      span.classList.add("two");
      span.title = char + " = 2 (chữ + dấu thanh)";
    }
    else if (isPunctuation(char)) {
      total += 1;
      countPunct++;
      span.classList.add("punct");
      span.title = char + " = 1 (dấu câu)";
    }
    else {
      total += 1;
      countOne++;
      span.classList.add("one");
      span.title = char + " = 1";
    }

    span.innerText = char;
    output.appendChild(span);
  }

  document.getElementById("total").innerText = "Tổng: " + total;
  document.getElementById("countOne").innerText = countOne;
  document.getElementById("countTwo").innerText = countTwo;
  document.getElementById("countPunct").innerText = countPunct;
}
</script>

</body>
</html>

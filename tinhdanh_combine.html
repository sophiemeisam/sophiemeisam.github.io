<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Sophie Meisam - Dịch Lý Combine</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; color: #333; padding: 20px; line-height: 1.6; }
        .container { max-width: 800px; margin: auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .section { margin-bottom: 20px; padding: 15px; border: 1px solid #eee; border-radius: 8px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], select { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #3498db; color: white; border: none; border-radius: 4px; font-size: 18px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #2980b9; }
        #result { margin-top: 30px; padding: 20px; background: #e8f4fd; border-radius: 8px; display: none; }
        .hex-box { display: flex; justify-content: space-around; text-align: center; margin-top: 20px; }
        .hex-display { font-size: 24px; font-weight: bold; color: #d35400; }
        .binary { font-family: monospace; color: #7f8c8d; }
    </style>
</head>
<body>

<div class="container">
    <h1>Hệ Thống Lập Quẻ Combine</h1>
    
    <div class="section">
        <label>Họ Tên Người 1 (Name 1):</label>
        <input type="text" id="name1" placeholder="Ví dụ: Lê Tư">
        <label>Họ Tên Người 2 (Name 2):</label>
        <input type="text" id="name2" placeholder="Ví dụ: Thanh Phong Dương">
    </div>

    <div class="section">
        <label>Thời gian (Bỏ trống = 0):</label>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <select id="year"><option value="0">-- Năm --</option></select>
            <select id="month"><option value="0">-- Tháng --</option></select>
            <select id="day"><option value="0">-- Ngày --</option></select>
            <select id="hour"><option value="0">-- Giờ --</option></select>
        </div>
    </div>

    <button onclick="lapQue()">Lập Quẻ Kết Hợp</button>

    <div id="result">
        <h3>Kết Quả Luận Giải</h3>
        <div id="summary"></div>
        <div class="hex-box">
            <div>
                <div><strong>Quẻ Chủ (T3H3)</strong></div>
                <div id="queChuName" class="hex-display"></div>
                <div id="queChuBinary" class="binary"></div>
            </div>
            <div style="font-size: 40px; align-self: center;">➔</div>
            <div>
                <div><strong>Quẻ Biến (T4H4)</strong></div>
                <div id="queBienName" class="hex-display"></div>
                <div id="queBienBinary" class="binary"></div>
            </div>
        </div>
        <p id="dongHaoNote" style="text-align: center; font-weight: bold; margin-top: 20px;"></p>
    </div>
</div>

<script>
    // Bảng mã Địa Chi
    const chiStandard = ["Tý","Sửu","Dần","Mão","Thìn","Tị","Ngọ","Mùi","Thân","Dậu","Tuất","Hợi"];
    const chiMonth = ["Dần","Mão","Thìn","Tị","Ngọ","Mùi","Thân","Dậu","Tuất","Hợi","Tý","Sửu"];
    
    // Khởi tạo menu select
    function initSelect() {
        const sYear = document.getElementById('year');
        const sMonth = document.getElementById('month');
        const sDay = document.getElementById('day');
        const sHour = document.getElementById('hour');

        chiStandard.forEach((name, i) => {
            sYear.add(new Option(name, i + 1));
            sDay.add(new Option(name, i + 1));
            sHour.add(new Option(name, i + 1));
        });
        chiMonth.forEach((name, i) => {
            sMonth.add(new Option(name, i + 1));
        });
    }
    initSelect();

    const queData = {
        1: { name: "Kiền", bin: "111" }, 2: { name: "Đoài", bin: "011" },
        3: { name: "Ly",   bin: "101" }, 4: { name: "Chấn", bin: "001" },
        5: { name: "Tốn",  bin: "110" }, 6: { name: "Khảm", bin: "010" },
        7: { name: "Cấn",  bin: "100" }, 8: { name: "Khôn", bin: "000" }
    };

    const lookup64 = {
        "74": "Sơn Lôi Di", "34": "Hỏa Lôi Phệ Hạp", // Thêm các quẻ khác tại đây
        "11": "Thuần Kiền", "88": "Thuần Khôn"
    };

    function getNameStats(name) {
        let words = name.trim().split(/\s+/).filter(w => w.length > 0);
        let total = words.length;
        if (total === 0) return { t: 0, h: 0 };
        let t = Math.floor(total / 2);
        let h = total - t;
        if (t === 0) t = h; // Trường hợp 1 chữ
        return { t, h };
    }

    function getQueFromNum(n) {
        let res = n % 8;
        return res === 0 ? 8 : res;
    }

    function lapQue() {
        let n1 = document.getElementById('name1').value;
        let n2 = document.getElementById('name2').value;
        let s1 = getNameStats(n1);
        let s2 = getNameStats(n2);

        let tYear = parseInt(document.getElementById('year').value);
        let tMonth = parseInt(document.getElementById('month').value);
        let tDay = parseInt(document.getElementById('day').value);
        let tHour = parseInt(document.getElementById('hour').value);

        // Logic T3, H3
        let T3 = getQueFromNum(s1.t + s2.t);
        let H3 = getQueFromNum(s1.h + s2.h);

        // Hào động
        let totalHao = s1.t + s2.t + s1.h + s2.h + tYear + tMonth + tDay + tHour;
        let haoDong = totalHao % 6;
        if (haoDong === 0) haoDong = 6;

        // Xử lý Biến Quẻ (Nhìn từ trên xuống)
        let t3Bin = queData[T3].bin.split(''); // [H6, H5, H4]
        let h3Bin = queData[H3].bin.split(''); // [H3, H2, H1]
        let fullBin = [...t3Bin, ...h3Bin]; // Index 0-5 tương ứng Hào 6-1
        
        // Vị trí hào động trong mảng (6 -> index 0, 5 -> index 1... 1 -> index 5)
        let targetIndex = 6 - haoDong;
        fullBin[targetIndex] = fullBin[targetIndex] === '1' ? '0' : '1';

        let t4Bin = fullBin.slice(0, 3).join('');
        let h4Bin = fullBin.slice(3, 6).join('');

        function findQueKey(bin) {
            for (let key in queData) if (queData[key].bin === bin) return key;
        }

        let T4 = findQueKey(t4Bin);
        let H4 = findQueKey(h4Bin);

        // Hiển thị kết quả
        document.getElementById('result').style.display = 'block';
        document.getElementById('queChuName').innerText = (lookup64[T3+""+H3] || queData[T3].name + " " + queData[H3].name);
        document.getElementById('queChuBinary').innerText = t3Bin.join('') + " / " + h3Bin.join('');
        
        document.getElementById('queBienName').innerText = (lookup64[T4+""+H4] || queData[T4].name + " " + queData[H4].name);
        document.getElementById('queBienBinary').innerText = t4Bin + " / " + h4Bin;
        
        document.getElementById('dongHaoNote').innerText = "Động Hào " + haoDong;
        document.getElementById('summary').innerHTML = `Tổng số tính hào: ${totalHao} <br> Quẻ chủ: ${T3}/${H3}`;
    }
</script>

</body>
</html>

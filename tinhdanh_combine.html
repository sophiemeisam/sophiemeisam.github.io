<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Combine Dịch Học - Sophie Meisam</title>
    <style>
        :root { --primary-gold: #f1c40f; --dark-bg: #1a1a1a; --card-bg: #262626; --text: #eee; --green: #28a745; }
        body { font-family: -apple-system, sans-serif; background: var(--dark-bg); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; }
        .container { width: 95%; max-width: 500px; }
        h2 { text-align: center; color: var(--primary-gold); font-size: 1.4rem; margin: 15px 0; }

        .input-section { background: var(--card-bg); padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); margin-bottom: 20px; border: 1px solid #444; }
        input[type="text"] { width: 100%; padding: 12px; font-size: 1rem; border: 1px solid #444; border-radius: 8px; margin-bottom: 12px; background: #333; color: #fff; box-sizing: border-box; }
        .grid-time { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        select { padding: 10px; background: #333; color: white; border: 1px solid #444; border-radius: 8px; }
        .calc-btn { width: 100%; padding: 15px; background: var(--primary-gold); color: #000; border: none; border-radius: 10px; font-size: 1.1rem; font-weight: bold; cursor: pointer; }

        .card { background: var(--card-bg); padding: 20px; border-radius: 15px; border-left: 5px solid var(--primary-gold); margin-bottom: 20px; text-align: center; }
        .label-tag { font-size: 0.75rem; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
        .que-name { font-size: 26px; font-weight: bold; color: var(--primary-gold); margin: 10px 0; }
        
        .hexagram { display: flex; flex-direction: column; gap: 8px; align-items: center; margin: 15px 0; }
        .line { width: 120px; height: 10px; background-color: var(--primary-gold); border-radius: 2px; position: relative; }
        .line.broken { background-color: transparent; display: flex; justify-content: space-between; }
        .line.broken::before, .line.broken::after { content: ""; width: 44%; height: 100%; background-color: var(--primary-gold); border-radius: 2px; }
        .moving-tag { position: absolute; right: -30px; color: #ff4757; font-weight: bold; font-size: 20px; }

        .binary-info { font-size: 0.85rem; font-family: monospace; background: #333; padding: 4px 12px; border-radius: 5px; color: #00ff00; }
        .copy-btn { width: 100%; padding: 15px; background: var(--green); color: white; border: none; border-radius: 10px; font-size: 1rem; font-weight: bold; cursor: pointer; margin-top: 10px; box-shadow: 0 4px 10px rgba(40,167,69,0.3); }
    </style>
</head>
<body>

    <div class="container">
        <h2>Dịch Lý Combine</h2>

        <div class="input-section">
            <input type="text" id="name1" placeholder="Họ tên người 1 (Ví dụ: Lê Tư)">
            <input type="text" id="name2" placeholder="Họ tên người 2 (Ví dụ: Thanh Phong Dương)">
            
            <div class="grid-time">
                <select id="year"><option value="0">Năm (Bỏ trống)</option></select>
                <select id="month"><option value="0">Tháng (Bỏ trống)</option></select>
                <select id="day"><option value="0">Ngày (Bỏ trống)</option></select>
                <select id="hour"><option value="0">Giờ (Bỏ trống)</option></select>
            </div>
            
            <button class="calc-btn" onclick="executeCombine()">Tính Quẻ Kết Hợp</button>
        </div>

        <div id="results" style="display:none;">
            <div class="card">
                <span class="label-tag">Quẻ Chủ (T3H3)</span>
                <div id="name-Chu" class="que-name">---</div>
                <div id="visual-Chu" class="hexagram"></div>
                <div id="code-Chu" class="binary-info">---</div>
            </div>

            <div class="card" style="border-left-color: #ff4757;">
                <span class="label-tag">Quẻ Biến (T4H4) - Động Hào <span id="dong-val"></span></span>
                <div id="name-Bien" class="que-name">---</div>
                <div id="visual-Bien" class="hexagram"></div>
                <div id="code-Bien" class="binary-info">---</div>
            </div>

            <button class="copy-btn" onclick="copyResult()">Sao chép kết luận</button>
        </div>
    </div>

<script>
    const data64Que = {
        "111111": "Thuần Càn", "000000": "Thuần Khôn", "010001": "Thủy Lôi Truân", "100010": "Sơn Thủy Mông",
        "010111": "Thủy Thiên Nhu", "111010": "Thiên Thủy Tụng", "000010": "Địa Thủy Sư", "010000": "Thủy Địa Tỷ",
        "110111": "Phong Thiên Tiểu Súc", "111011": "Thiên Trạch Lý", "000111": "Địa Thiên Thái", "111000": "Thiên Địa Bĩ",
        "111101": "Thiên Hỏa Đồng Nhân", "101111": "Hỏa Thiên Đại Hữu", "000100": "Địa Sơn Khiêm", "001000": "Lôi Địa Dự",
        "011001": "Trạch Lôi Tùy", "100110": "Sơn Phong Cổ", "000011": "Địa Trạch Lâm", "110000": "Phong Địa Quán",
        "101001": "Hỏa Lôi Phệ Hạp", "100101": "Sơn Hỏa Bí", "100000": "Sơn Địa Bác", "000001": "Địa Lôi Phục",
        "111001": "Thiên Lôi Vô Vọng", "100111": "Sơn Thiên Đại Súc", "100001": "Sơn Lôi Di", "011110": "Trạch Phong Đại Quá",
        "010010": "Thuần Khảm", "101101": "Thuần Ly", "011100": "Trạch Sơn Hàm", "001110": "Lôi Phong Hằng",
        "111100": "Thiên Sơn Độn", "001111": "Lôi Thiên Đại Tráng", "101000": "Hỏa Địa Tấn", "000101": "Địa Hỏa Minh Di",
        "110101": "Phong Hỏa Gia Nhân", "101011": "Hỏa Trạch Khuê", "010100": "Thủy Sơn Kiển", "001010": "Lôi Thủy Giải",
        "100011": "Sơn Trạch Tổn", "110001": "Phong Lôi Ích", "011111": "Trạch Thiên Quải", "111110": "Thiên Phong Cấu",
        "011000": "Trạch Địa Tụy", "000110": "Địa Phong Thăng", "011010": "Trạch Thủy Khốn", "010110": "Thủy Phong Tỉnh",
        "011101": "Trạch Hỏa Cách", "101110": "Hỏa Phong Đỉnh", "001001": "Thuần Chấn", "100100": "Thuần Cấn",
        "110100": "Phong Sơn Tiệm", "001011": "Lôi Trạch Quy Muội", "001101": "Lôi Hỏa Phong", "101100": "Hỏa Sơn Lữ",
        "110110": "Thuần Tốn", "011011": "Thuần Đoài", "110010": "Phong Thủy Hoán", "010011": "Thủy Trạch Tiết",
        "110011": "Phong Trạch Trung Phu", "001100": "Lôi Sơn Tiểu Quá", "010101": "Thủy Hỏa Ký Tế", "101010": "Hỏa Thủy Vị Tế"
    };

    const chiStandard = ["Tý","Sửu","Dần","Mão","Thìn","Tị","Ngọ","Mùi","Thân","Dậu","Tuất","Hợi"];
    const chiMonth = ["Dần","Mão","Thìn","Tị","Ngọ","Mùi","Thân","Dậu","Tuất","Hợi","Tý","Sửu"];
    const batQuaiMã = ["000", "111", "011", "101", "001", "110", "010", "100", "000"]; 

    function initSelect() {
        const sY = document.getElementById('year'), sM = document.getElementById('month'), sD = document.getElementById('day'), sH = document.getElementById('hour');
        chiStandard.forEach((n, i) => { sY.add(new Option(n, i + 1)); sD.add(new Option(n, i + 1)); sH.add(new Option(n, i + 1)); });
        chiMonth.forEach((n, i) => { sM.add(new Option(n, i + 1)); });
    }
    initSelect();

    function countKýÂm(str) {
        let s = str.replace(/\s/g, '').toLowerCase();
        let charCount = s.length;
        let accents = (str.normalize('NFD').match(/[\u0300\u0301\u0303\u0309\u0323]/g) || []).length;
        return charCount + accents;
    }

    // FIX LOGIC Ở ĐÂY:
    function getNameParts(fullname) {
        const words = fullname.trim().split(/\s+/);
        const n = words.length;
        let tTxt = "", hTxt = "";

        if (n <= 1) {
            tTxt = words[0] || "";
            hTxt = "";
        } else {
            // Quy tắc: 2 từ -> 1/1, 3 từ -> 1/2, 4 từ -> 2/2, 5 từ -> 2/3
            // Dùng Math.floor(n/2) để lấy số lượng từ cho quẻ Thượng
            const mid = Math.floor(n / 2);
            tTxt = words.slice(0, mid).join("");
            hTxt = words.slice(mid).join("");
        }

        return { t: countKýÂm(tTxt), h: countKýÂm(hTxt) };
    }

    function draw(id, code, movingHao = -1) {
        const c = document.getElementById(id); c.innerHTML = "";
        for (let i = 0; i < 6; i++) {
            const haoLevel = 6 - i;
            const l = document.createElement('div');
            l.className = (code[i] === '1') ? "line" : "line broken";
            if (haoLevel === movingHao) {
                const tag = document.createElement('span'); tag.className = "moving-tag"; tag.innerText = "×";
                l.appendChild(tag);
            }
            c.appendChild(l);
        }
    }

    function executeCombine() {
        const n1 = document.getElementById('name1').value;
        const n2 = document.getElementById('name2').value;
        if (!n1 || !n2) return alert("Vui lòng nhập cả 2 tên!");

        const p1 = getNameParts(n1); 
        const p2 = getNameParts(n2); 

        const y = parseInt(document.getElementById('year').value);
        const m = parseInt(document.getElementById('month').value);
        const d = parseInt(document.getElementById('day').value);
        const h = parseInt(document.getElementById('hour').value);

        // Quẻ Chủ T3H3
        const scoreUp = p1.t + p2.t;
        const scoreLow = p1.h + p2.h;
        
        const upMã = batQuaiMã[scoreUp % 8 === 0 ? 8 : scoreUp % 8];
        const lowMã = batQuaiMã[scoreLow % 8 === 0 ? 8 : scoreLow % 8];
        const codeChu = upMã + lowMã;

        // Hào động: T1+T2 + H1+H2 + Năm+Tháng+Ngày+Giờ
        const totalHao = p1.t + p2.t + p1.h + p2.h + y + m + d + h;
        let haoDong = totalHao % 6 === 0 ? 6 : totalHao % 6;

        // Quẻ Biến T4H4
        let binaryArr = codeChu.split("");
        let idxDong = 6 - haoDong; 
        binaryArr[idxDong] = binaryArr[idxDong] === "1" ? "0" : "1";
        const codeBien = binaryArr.join("");

        document.getElementById('name-Chu').innerText = data64Que[codeChu] || "Quẻ Lạ";
        document.getElementById('code-Chu').innerText = upMã + " " + lowMã;
        draw('visual-Chu', codeChu);

        document.getElementById('dong-val').innerText = haoDong;
        document.getElementById('name-Bien').innerText = data64Que[codeBien] || "Quẻ Lạ";
        document.getElementById('code-Bien').innerText = codeBien.slice(0,3) + " " + codeBien.slice(3);
        draw('visual-Bien', codeBien, haoDong);

        document.getElementById('results').style.display = 'block';
    }

    function copyResult() {
        const n1 = document.getElementById('name1').value;
        const n2 = document.getElementById('name2').value;
        const yTxt = document.getElementById('year').options[document.getElementById('year').selectedIndex].text;
        const mTxt = document.getElementById('month').options[document.getElementById('month').selectedIndex].text;
        const dTxt = document.getElementById('day').options[document.getElementById('day').selectedIndex].text;
        const hTxt = document.getElementById('hour').options[document.getElementById('hour').selectedIndex].text;
        
        const chu = document.getElementById('name-Chu').innerText;
        const bien = document.getElementById('name-Bien').innerText;
        const dong = document.getElementById('dong-val').innerText;

        const copyText = `--- DỮ LIỆU DỊCH LÝ COMBINE ---
Người 1: ${n1}
Người 2: ${n2}
Thời gian: Năm ${yTxt} - Tháng ${mTxt} - Ngày ${dTxt} - Giờ ${hTxt}
Quẻ Chủ: ${chu}
Quẻ Biến: ${bien}
Hào Động: ${dong}
------------------------------`;

        navigator.clipboard.writeText(copyText).then(() => {
            alert("Đã sao chép toàn bộ dữ liệu vào Clipboard!");
        }).catch(err => {
            alert("Lỗi khi sao chép: ", err);
        });
    }
</script>
</body>
</html>

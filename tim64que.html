<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lập Quẻ Dịch Số</title>
    <style>
        :root { --primary: #1a73e8; --accent: #d93025; --bg: #f8f9fa; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        
        .container { width: 100%; max-width: 400px; background: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; font-size: 1.2rem; margin-bottom: 20px; }

        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.85rem; color: #666; margin-bottom: 8px; font-weight: bold; }
        input { 
            width: 100%; padding: 15px; border: 2px solid #ddd; border-radius: 10px; 
            font-size: 1.2rem; outline: none; transition: 0.2s; text-align: center; letter-spacing: 2px;
        }
        input:focus { border-color: var(--primary); background: #f0f7ff; }

        button { 
            width: 100%; padding: 15px; background: var(--primary); color: white; 
            border: none; border-radius: 10px; font-size: 1rem; font-weight: bold; cursor: pointer;
        }
        button:active { transform: scale(0.98); }

        #result { margin-top: 25px; display: none; text-align: center; animation: fadeIn 0.4s; }
        .que-name { font-size: 1.5rem; font-weight: 800; color: #1a73e8; margin-bottom: 5px; }
        .hao-dong-txt { color: var(--accent); font-weight: bold; margin-bottom: 15px; }

        /* Vẽ vạch quẻ */
        .hexagram { display: flex; flex-direction: column-reverse; gap: 8px; align-items: center; margin: 20px 0; }
        .line-wrapper { display: flex; align-items: center; gap: 15px; position: relative; }
        .line { width: 120px; height: 12px; background: #333; border-radius: 2px; }
        .line.broken { background: transparent; display: flex; justify-content: space-between; }
        .line.broken::before, .line.broken::after { content: ""; width: 44%; height: 100%; background: #333; border-radius: 2px; }
        
        /* Chấm đỏ hào động */
        .dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; visibility: hidden; }
        .active .dot { visibility: visible; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <h2>LẬP QUẺ THEO DÃY SỐ</h2>
    
    <div class="input-group">
        <label>NHẬP DÃY SỐ (6, 8, 10... CHẴN SỐ)</label>
        <input type="number" id="numInput" placeholder="Ví dụ: 345518" inputmode="numeric">
    </div>
    
    <button onclick="tinhQue()">TÍNH QUẺ</button>

    <div id="result">
        <div id="queName" class="que-name">---</div>
        <div id="haoDongTxt" class="hao-dong-txt">---</div>
        <div id="visualQue" class="hexagram"></div>
    </div>
</div>

<script>
    const batQuai = [
        { name: "Khôn", code: "000" }, // Dư 0
        { name: "Kiền", code: "111" }, // Dư 1
        { name: "Đoài", code: "011" }, // Dư 2
        { name: "Ly",   code: "101" }, // Dư 3
        { name: "Chấn", code: "001" }, // Dư 4
        { name: "Tốn",  code: "110" }, // Dư 5
        { name: "Khảm", code: "010" }, // Dư 6
        { name: "Cấn",  code: "100" }  // Dư 7
    ];

    const data64Que = {
        "111111": "Thuần Càn", "000000": "Thuần Khôn", "010001": "Thủy Lôi Truân", "100010": "Sơn Thủy Mông",
        "010111": "Thủy Thiên Nhu", "111010": "Thiên Thủy Tụng", "000010": "Địa Thủy Sư", "010000": "Thủy Địa Tỷ",
        "110111": "Phong Thiên Tiểu Súc", "111011": "Thiên Trạch Lý", "000111": "Địa Thiên Thái", "111000": "Thiên Địa Bĩ",
        "111101": "Thiên Hỏa Đồng Nhân", "101111": "Hỏa Thiên Đại Hữu", "000100": "Địa Sơn Khiêm", "001000": "Lôi Địa Dự",
        "011001": "Trạch Lôi Tùy", "100110": "Sơn Phong Cổ", "000011": "Địa Trạch Lâm", "110000": "Phong Địa Quán",
        "101001": "Hỏa Lôi Phệ Hạp", "100101": "Sơn Hỏa Bí", "100000": "Sơn Địa Bác", "000001": "Địa Lôi Phục",
        "111001": "Thiên Lôi Vô Vọng", "100111": "Sơn Thiên Đại Súc", "100001": "Sơn Lôi Di", "011110": "Trạch Phong Đại Quá",
        "010010": "Thuần Khảm", "101101": "Thuần Ly", "011100": "Trạch Sơn Hàm", "001110": "Lôi Phong Hằng",
        "111100": "Thiên Sơn Độn", "001111": "Lôi Thiên Đại Tráng", "101000": "Hỏa Địa Tấn", "000101": "Địa Hỏa Minh Di",
        "110101": "Phong Hỏa Gia Nhân", "101011": "Hỏa Trạch Khuê", "010100": "Thủy Sơn Kiển", "001010": "Lôi Thủy Giải",
        "100011": "Sơn Trạch Tổn", "110001": "Phong Lôi Ích", "011111": "Trạch Thiên Quải", "111110": "Thiên Phong Cấu",
        "011000": "Trạch Địa Tụy", "000110": "Địa Phong Thăng", "011010": "Trạch Thủy Khốn", "010110": "Thủy Phong Tỉnh",
        "011101": "Trạch Hỏa Cách", "101110": "Hỏa Phong Đỉnh", "001001": "Thuần Chấn", "100100": "Thuần Cấn",
        "110100": "Phong Sơn Tiệm", "001011": "Lôi Trạch Quy Muội", "001101": "Lôi Hỏa Phong", "101100": "Hỏa Sơn Lữ",
        "110110": "Thuần Tốn", "011011": "Thuần Đoài", "110010": "Phong Thủy Hoán", "010011": "Thủy Trạch Tiết",
        "110011": "Phong Trạch Trung Phu", "001100": "Lôi Sơn Tiểu Quá", "010101": "Thủy Hỏa Ký Tế", "101010": "Hỏa Thủy Vị Tế"
    };

    function tinhSum(str) {
        return str.split('').reduce((a, b) => parseInt(a) + parseInt(b), 0);
    }

    function tinhQue() {
        const val = document.getElementById('numInput').value;
        if (val.length < 6 || val.length % 2 !== 0) {
            alert("Vui lòng nhập dãy số chẵn (6, 8, 10... con số)");
            return;
        }

        const half = val.length / 2;
        const sTruoc = val.substring(0, half);
        const sSau = val.substring(half);

        const tongTruoc = tinhSum(sTruoc);
        const tongSau = tinhSum(sSau);

        // Chia 8 lấy dư (Dư 0 tính là 8 - Khôn)
        const thượngIdx = tongTruoc % 8;
        const hạIdx = tongSau % 8;
        
        const thượng = batQuai[thượngIdx];
        const hạ = batQuai[hạIdx];

        // Hào động: Tổng chia 6 lấy dư (Dư 0 là hào 6)
        let hàoĐộng = (tongTruoc + tongSau) % 6;
        if (hàoĐộng === 0) hàoĐộng = 6;

        const codeBD = thượng.code + hạ.code;
        const tenQue = data64Que[codeBD];

        // Hiển thị kết quả
        document.getElementById('result').style.display = 'block';
        document.getElementById('queName').innerText = tenQue;
        document.getElementById('haoDongTxt').innerText = `Động hào ${hàoĐộng}`;

        // Vẽ quẻ
        const visual = document.getElementById('visualQue');
        visual.innerHTML = '';
        
        // Vẽ từ dưới lên (Hào 1 ở dưới cùng)
        const fullCode = codeBD.split('').reverse(); 
        fullCode.forEach((char, index) => {
            const hienTai = index + 1;
            const wrapper = document.createElement('div');
            wrapper.className = 'line-wrapper' + (hienTai === hàoĐộng ? ' active' : '');
            
            const line = document.createElement('div');
            line.className = char === '1' ? 'line' : 'line broken';
            
            const dot = document.createElement('div');
            dot.className = 'dot';

            wrapper.appendChild(line);
            wrapper.appendChild(dot);
            visual.appendChild(wrapper);
        });
    }
</script>

</body>
</html>
